<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Envelope -->
  <rect x="280" y="130" width="240" height="160" rx="4" stroke="#2DD4BF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M280 130 L400 220 L520 130" stroke="#2DD4BF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shield / Block symbol -->
  <circle cx="480" cy="250" r="45" stroke="#F87171" stroke-width="3" fill="none"/>
  <line x1="450" y1="220" x2="510" y2="280" stroke="#F87171" stroke-width="3" stroke-linecap="round"/>
  <!-- Spam lines -->
  <path d="M310 170 L370 170" stroke="#2DD4BF" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="4 3"/>
  <path d="M310 185 L355 185" stroke="#2DD4BF" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="4 3"/>
  <path d="M310 200 L345 200" stroke="#2DD4BF" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="4 3"/>
  <!-- Bouncing emails -->
  <rect x="160" y="180" width="60" height="40" rx="2" stroke="#F87171" stroke-width="2" fill="none" opacity="0.5" transform="rotate(-15 190 200)"/>
  <rect x="580" y="160" width="60" height="40" rx="2" stroke="#F87171" stroke-width="2" fill="none" opacity="0.5" transform="rotate(10 610 180)"/>
  <!-- X marks -->
  <path d="M175 195 L195 215 M195 195 L175 215" stroke="#F87171" stroke-width="2" opacity="0.5"/>
  <path d="M595 175 L615 195 M615 175 L595 195" stroke="#F87171" stroke-width="2" opacity="0.5"/>
  <!-- Label -->
  <text x="400" y="390" font-family="monospace" font-size="14" fill="#2DD4BF" text-anchor="middle" opacity="0.7">BLOCK JUNK EMAILS</text>
  <path d="M300 400 Q400 405 500 400" stroke="#F87171" stroke-width="1.5" fill="none" stroke-dasharray="5 4"/>
</svg>