<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Two boxing gloves facing each other -->
  <!-- Left glove -->
  <ellipse cx="250" cy="200" rx="70" ry="60" fill="none" stroke="#F87171" stroke-width="3" stroke-linecap="round"/>
  <path d="M210 250 L210 300 L230 310 L230 260" fill="none" stroke="#F87171" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="250" y="205" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="11" opacity="0.8">Never</text>
  <text x="250" y="220" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="11" opacity="0.8">Bounce</text>
  <!-- Right glove -->
  <ellipse cx="550" cy="200" rx="70" ry="60" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <path d="M590 250 L590 300 L570 310 L570 260" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="550" y="205" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="11" opacity="0.8">Zero</text>
  <text x="550" y="220" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="11" opacity="0.8">Bounce</text>
  <!-- VS in center -->
  <text x="400" y="210" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="36" font-weight="bold" opacity="0.6">VS</text>
  <!-- Impact lines -->
  <line x1="330" y1="180" x2="350" y2="180" stroke="#F87171" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="335" y1="200" x2="360" y2="200" stroke="#F87171" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="330" y1="220" x2="350" y2="220" stroke="#F87171" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="450" y1="180" x2="470" y2="180" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="440" y1="200" x2="465" y2="200" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="450" y1="220" x2="470" y2="220" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Question mark -->
  <text x="400" y="130" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="30" opacity="0.3">?</text>
  <text x="400" y="410" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="14" opacity="0.6">NeverBounce vs ZeroBounce</text>
</svg>