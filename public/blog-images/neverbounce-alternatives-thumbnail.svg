<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Podium / comparison blocks -->
  <rect x="180" y="200" width="120" height="150" rx="4" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
  <rect x="340" y="140" width="120" height="210" rx="4" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
