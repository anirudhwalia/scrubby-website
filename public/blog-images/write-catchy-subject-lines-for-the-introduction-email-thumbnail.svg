<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Email inbox preview -->
  <rect x="140" y="60" width="520" height="280" rx="8" stroke="#2DD4BF" stroke-width="2.5" fill="none" transform="rotate(-0.5 400 200)"/>
  <!-- Subject line rows -->
  <g opacity="0.5">
    <line x1="140" y1="115" x2="660" y2="115" stroke="#2DD4BF" stroke-width="1"/>
    <line x1="140" y1="170" x2="660" y2="170" stroke="#2DD4BF" stroke-width="1"/>
    <line x1="140" y1="225" x2="660" y2="225" stroke="#2DD4BF" stroke-width="1"/>
    <line x1="140" y1="280" x2="660" y2="280" stroke="#2DD4BF" stroke-width="1"/>
  </g>
  <!-- Subject line text placeholders -->
  <g stroke="#2DD4BF" stroke-width="1.5" opacity="0.4">
    <line x1="170" y1="90" x2="350" y2="90"/>
    <line x1="170" y1="145" x2="400" y2="145"/>
    <line x1="170" y1="200" x2="320" y2="200"/>
    <line x1="170" y1="255" x2="380" y2="255"/>
    <line x1="170" y1="310" x2="340" y2="310"/>
  </g>
  <!-- Star/highlight on second row (the catchy one) -->
  <rect x="145" y="120" width="510" height="48" rx="4" fill="#F87171" fill-opacity="0.08" stroke="#F87171" stroke-width="2"/>
  <line x1="170" y1="145" x2="400" y2="145" stroke="#F87171" stroke-width="2.5" opacity="0.8"/>
  <!-- Cursor pointing at highlighted row -->
  <g transform="translate(430, 135)" stroke="#F87171" stroke-width="2" fill="none">
    <path d="M0 0 L0 18 L5 14 L10 22 L13 20 L8 12 L14 11 Z"/>
  </g>
  <!-- Pencil icon -->
  <g transform="translate(680, 80)" stroke="#F87171" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M0 40 L25 5 L35 15 L10 50 Z"/>
    <line x1="25" y1="5" x2="35" y2="15"/>
    <line x1="0" y1="40" x2="10" y2="50"/>
  </g>
  <!-- Sparkle/star effects -->
  <g fill="#F87171" opacity="0.5">
    <path d="M100 140 l3-8 3 8 8-3-8 3 3 8-3-8-8 3z"/>
    <path d="M720 160 l2-6 2 6 6-2-6 2 2 6-2-6-6 2z"/>
  </g>
  <!-- Open rate indicator -->
  <g transform="translate(580, 78)">
    <text x="0" y="0" font-family="Arial" font-size="11" fill="#2DD4BF" opacity="0.6">Open Rate</text>
    <text x="0" y="18" font-family="Arial" font-size="16" fill="#2DD4BF" font-weight="bold">72%</text>
  </g>
  <text x="400" y="380" font-family="Arial" font-size="19" fill="#2DD4BF" text-anchor="middle" font-weight="bold">Catchy Subject Lines</text>
  <text x="400" y="408" font-family="Arial" font-size="14" fill="#F87171" text-anchor="middle" opacity="0.7">Introduction Emails That Get Opened</text>
</svg>