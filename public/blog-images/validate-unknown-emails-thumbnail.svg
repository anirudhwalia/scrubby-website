<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Magnifying glass over envelope -->
  <g transform="translate(300, 80)">
    <circle cx="100" cy="100" r="80" stroke="#2DD4BF" stroke-width="3" fill="none" transform="rotate(-2 100 100)"/>
    <line x1="157" y1="160" x2="210" y2="220" stroke="#2DD4BF" stroke-width="4" stroke-linecap="round"/>
    <!-- Envelope inside magnifying glass -->
    <g transform="translate(55, 65)" stroke="#F87171" stroke-width="2.5" fill="none">
      <rect width="90" height="60" rx="3" transform="rotate(1 45 30)"/>
      <path d="M2 2 L45 35 L88 2"/>
    </g>
    <!-- Question mark on envelope -->
    <text x="100" y="115" font-family="Arial" font-size="30" fill="#F87171" text-anchor="middle" font-weight="bold" opacity="0.8">?</text>
  </g>
  <!-- Status indicators -->
  <g transform="translate(80, 160)">
    <circle cx="15" cy="0" r="8" stroke="#F87171" stroke-width="2" fill="none"/>
    <text x="15" y="4" font-family="Arial" font-size="12" fill="#F87171" text-anchor="middle">?</text>
    <line x1="30" y1="0" x2="130" y2="1" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
  </g>
  <g transform="translate(80, 200)">
    <circle cx="15" cy="0" r="8" stroke="#2DD4BF" stroke-width="2" fill="none"/>
    <path d="M10 0 L14 5 L22 -5" stroke="#2DD4BF" stroke-width="2" fill="none"/>
    <line x1="30" y1="0" x2="150" y2="-1" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
  </g>
  <g transform="translate(80, 240)">
    <circle cx="15" cy="0" r="8" stroke="#F87171" stroke-width="2" fill="none"/>
    <path d="M10 -4 L20 5 M20 -4 L10 5" stroke="#F87171" stroke-width="2" fill="none"/>
    <line x1="30" y1="0" x2="120" y2="1" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Arrow from unknown to valid -->
  <g transform="translate(560, 130)" stroke="#2DD4BF" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M0 100 Q30 50 60 0"/>
    <path d="M52 8 L62 -2 L68 12"/>
  </g>
  <text x="650" y="125" font-family="Arial" font-size="14" fill="#2DD4BF" opacity="0.7">Valid</text>
  <text x="650" y="240" font-family="Arial" font-size="14" fill="#F87171" opacity="0.7">Unknown</text>
  <text x="400" y="370" font-family="Arial" font-size="20" fill="#2DD4BF" text-anchor="middle" font-weight="bold">Validate Unknown Emails</text>
  <text x="400" y="400" font-family="Arial" font-size="14" fill="#F87171" text-anchor="middle" opacity="0.7">Turn Uncertain Into Actionable</text>
</svg>