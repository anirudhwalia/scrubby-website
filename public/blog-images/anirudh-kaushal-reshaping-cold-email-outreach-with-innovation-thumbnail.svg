<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Person silhouette (innovation leader) -->
  <circle cx="300" cy="130" r="35" fill="none" stroke="#2DD4BF" stroke-width="3"/>
  <path d="M260 200 Q300 230 340 200" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <line x1="300" y1="165" x2="300" y2="200" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <!-- Light bulb (innovation) -->
  <path d="M490 90 Q490 60 520 60 Q550 60 550 90 Q550 110 535 120 L505 120 Q490 110 490 90Z" fill="none" stroke="#F87171" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="508" y1="120" x2="508" y2="135" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <line x1="532" y1="120" x2="532" y2="135" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <line x1="505" y1="135" x2="535" y2="135" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <!-- Rays from bulb -->
  <line x1="520" y1="45" x2="520" y2="35" stroke="#F87171" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="555" y1="55" x2="565" y2="48" stroke="#F87171" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="485" y1="55" x2="475" y2="48" stroke="#F87171" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Email flying outward -->
  <rect x="400" y="190" width="50" height="35" rx="3" fill="none" stroke="#2DD4BF" stroke-width="2" transform="rotate(-10 425 207)"/>
  <path d="M400 190 L425 212 L450 190" fill="none" stroke="#2DD4BF" stroke-width="1.5" transform="rotate(-10 425 207)"/>
  <rect x="480" y="180" width="50" height="35" rx="3" fill="none" stroke="#F87171" stroke-width="2" transform="rotate(-15 505 197)"/>
  <rect x="550" y="175" width="50" height="35" rx="3" fill="none" stroke="#2DD4BF" stroke-width="1.5" transform="rotate(-20 575 192)" opacity="0.5"/>
  <!-- Arrow trajectory -->
  <path d="M350 210 Q500 170 650 150" fill="none" stroke="#2DD4BF" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>
  <polyline points="640,155 655,148 645,162" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
  <!-- Network nodes -->
  <circle cx="200" cy="280" r="8" fill="none" stroke="#F87171" stroke-width="1.5" opacity="0.5"/>
  <circle cx="280" cy="270" r="8" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="240" cy="310" r="8" fill="none" stroke="#F87171" stroke-width="1.5" opacity="0.4"/>
  <line x1="208" y1="280" x2="272" y2="270" stroke="#2DD4BF" stroke-width="1" opacity="0.3"/>
  <line x1="205" y1="287" x2="234" y2="304" stroke="#F87171" stroke-width="1" opacity="0.3"/>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="20" font-weight="bold" opacity="0.9">Reshaping Cold Email Outreach</text>
  <text x="400" y="410" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="14" opacity="0.7">with Innovation</text>
</svg>