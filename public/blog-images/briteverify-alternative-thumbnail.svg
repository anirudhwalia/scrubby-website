<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Scale / comparison -->
  <line x1="400" y1="100" x2="400" y2="180" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="180" x2="520" y2="180" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <!-- Left pan (lower = heavier = better) -->
  <path d="M280 180 L260 240 L340 240 L320 180" stroke="#F87171" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="260" y1="240" x2="340" y2="240" stroke="#F87171" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right pan (higher) -->
  <path d="M480 180 L460 220 L540 220 L520 180" stroke="#2DD4BF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <line x1="460" y1="220" x2="540" y2="220" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Checkmarks in left pan -->
  <path d="M285 225 L292 235 L310 215" stroke="#F87171" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- X in right pan -->
  <path d="M490 208 L505 218 M505 208 L490 218" stroke="#2DD4BF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Tool boxes below -->
  <rect x="200" y="280" width="80" height="50" rx="4" stroke="#F87171" stroke-width="2" fill="none"/>
  <rect x="310" y="280" width="80" height="50" rx="4" stroke="#2DD4BF" stroke-width="2" fill="none"/>
  <rect x="420" y="280" width="80" height="50" rx="4" stroke="#F87171" stroke-width="2" fill="none"/>
  <rect x="530" y="280" width="80" height="50" rx="4" stroke="#2DD4BF" stroke-width="2" fill="none"/>
  <!-- Stars -->
  <path d="M240 295 L243 288 L246 295 L240 290 L246 290 Z" fill="#F87171" opacity="0.8"/>
  <path d="M350 295 L353 288 L356 295 L350 290 L356 290 Z" fill="#2DD4BF" opacity="0.8"/>
  <path d="M460 295 L463 288 L466 295 L460 290 L466 290 Z" fill="#F87171" opacity="0.8"/>
  <path d="M570 295 L573 288 L576 295 L570 290 L576 290 Z" fill="#2DD4BF" opacity="0.8"/>
  <!-- Arrows -->
  <path d="M240 360 Q300 380 350 360" stroke="#2DD4BF" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Label -->
  <text x="400" y="400" font-family="monospace" font-size="13" fill="#2DD4BF" text-anchor="middle" opacity="0.7">BRITEVERIFY ALTERNATIVES</text>
</svg>