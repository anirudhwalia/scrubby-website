<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc" rx="8"/>

  <!-- Dormant subscriber list (left side) -->
  <rect x="60" y="80" width="200" height="280" rx="6" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="160" y="60" font-family="sans-serif" font-size="14" fill="#475569" text-anchor="middle" font-weight="600">Dormant List</text>

  <!-- Email rows with dust/cobweb marks -->
  <rect x="80" y="100" width="160" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="96" cy="114" r="6" fill="#ef4444" opacity="0.6"/>
  <line x1="110" y1="110" x2="210" y2="110" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="118" x2="180" y2="118" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>

  <rect x="80" y="140" width="160" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="96" cy="154" r="6" fill="#10b981" opacity="0.6"/>
  <line x1="110" y1="150" x2="200" y2="150" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="158" x2="175" y2="158" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>

  <rect x="80" y="180" width="160" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="96" cy="194" r="6" fill="#ef4444" opacity="0.6"/>
  <line x1="110" y1="190" x2="195" y2="190" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="198" x2="170" y2="198" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>

  <rect x="80" y="220" width="160" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="96" cy="234" r="6" fill="#f59e0b" opacity="0.6"/>
  <line x1="110" y1="230" x2="205" y2="230" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="238" x2="185" y2="238" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>

  <rect x="80" y="260" width="160" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="96" cy="274" r="6" fill="#ef4444" opacity="0.6"/>
  <line x1="110" y1="270" x2="190" y2="270" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="278" x2="168" y2="278" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>

  <rect x="80" y="300" width="160" height="28" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="96" cy="314" r="6" fill="#10b981" opacity="0.6"/>
  <line x1="110" y1="310" x2="215" y2="310" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="318" x2="178" y2="318" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Arrow to validation -->
  <path d="M280 220 Q340 220 380 220" stroke="#64748b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="378,214 388,220 378,226" fill="#64748b"/>
  <text x="335" y="210" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">validate</text>

  <!-- Validation funnel (center) -->
  <path d="M400 130 L520 130 L490 310 L430 310 Z" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="460" y="160" font-family="sans-serif" font-size="13" fill="#2563eb" text-anchor="middle" font-weight="600">Scrubby</text>

  <!-- Filter lines inside funnel -->
  <line x1="415" y1="190" x2="505" y2="190" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="420" y1="220" x2="500" y2="220" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="425" y1="250" x2="495" y2="250" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- X marks ejecting from funnel (invalid) -->
  <path d="M530 170 L542 182 M542 170 L530 182" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M545 200 L557 212 M557 200 L545 212" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M535 235 L547 247 M547 235 L535 247" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arrow from funnel to clean list -->
  <path d="M490 315 Q530 350 570 350" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="568,344 578,350 568,356" fill="#10b981"/>

  <!-- Clean validated list (right side) -->
  <rect x="590" y="290" width="160" height="120" rx="6" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <text x="670" y="275" font-family="sans-serif" font-size="14" fill="#10b981" text-anchor="middle" font-weight="600">Win-Back Ready</text>

  <rect x="610" y="310" width="120" height="22" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <path d="M618 321 L624 327 L636 315" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>

  <rect x="610" y="342" width="120" height="22" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <path d="M618 353 L624 359 L636 347" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>

  <rect x="610" y="374" width="120" height="22" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <path d="M618 385 L624 391 L636 379" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Reputation meter (top right) -->
  <text x="670" y="100" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">Sender Reputation</text>
  <rect x="620" y="110" width="100" height="12" rx="6" fill="#fee2e2"/>
  <rect x="620" y="110" width="75" height="12" rx="6" fill="#10b981"/>
  <text x="670" y="140" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="middle">Protected</text>
</svg>
