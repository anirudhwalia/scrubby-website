<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- NeverBounce-style results panel -->
  <rect x="180" y="60" width="440" height="260" rx="8" stroke="#2DD4BF" stroke-width="2.5" fill="none" transform="rotate(-0.5 400 190)"/>
  <!-- Header bar -->
  <line x1="180" y1="100" x2="620" y2="100" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
  <text x="400" y="88" font-family="Arial" font-size="14" fill="#2DD4BF" text-anchor="middle" opacity="0.7">Email Results</text>
  <!-- Result rows -->
  <g font-family="Arial" font-size="13">
    <!-- Valid -->
    <circle cx="220" cy="135" r="8" fill="#2DD4BF" fill-opacity="0.3" stroke="#2DD4BF" stroke-width="1.5"/>
    <path d="M215 135 L218 139 L226 131" stroke="#2DD4BF" stroke-width="2" fill="none"/>
    <text x="240" y="139" fill="#2DD4BF" opacity="0.8">Valid</text>
    <rect x="380" y="126" width="180" height="14" rx="7" fill="#2DD4BF" fill-opacity="0.15" stroke="#2DD4BF" stroke-width="1"/>
    <rect x="380" y="126" width="80" height="14" rx="7" fill="#2DD4BF" fill-opacity="0.3"/>
    <!-- Invalid -->
    <circle cx="220" cy="175" r="8" fill="#F87171" fill-opacity="0.3" stroke="#F87171" stroke-width="1.5"/>
    <path d="M215 171 L225 179 M225 171 L215 179" stroke="#F87171" stroke-width="2" fill="none"/>
    <text x="240" y="179" fill="#F87171" opacity="0.8">Invalid</text>
    <rect x="380" y="166" width="180" height="14" rx="7" fill="#F87171" fill-opacity="0.15" stroke="#F87171" stroke-width="1"/>
    <rect x="380" y="166" width="50" height="14" rx="7" fill="#F87171" fill-opacity="0.3"/>
    <!-- Accept-All / Catch-All (highlighted) -->
    <circle cx="220" cy="215" r="8" fill="#F87171" fill-opacity="0.3" stroke="#F87171" stroke-width="2"/>
    <text x="218" y="219" font-family="Arial" font-size="12" fill="#F87171" text-anchor="middle" font-weight="bold">?</text>
    <text x="240" y="219" fill="#F87171" font-weight="bold">Accept-All</text>
    <rect x="380" y="206" width="180" height="14" rx="7" fill="#F87171" fill-opacity="0.15" stroke="#F87171" stroke-width="1.5"/>
    <rect x="380" y="206" width="130" height="14" rx="7" fill="#F87171" fill-opacity="0.3"/>
  </g>
  <!-- Arrow pointing to Accept-All row -->
  <g stroke="#F87171" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M120 215 L170 215"/>
    <path d="M163 208 L173 215 L163 222"/>
  </g>
  <!-- Question marks -->
  <g font-family="Arial" fill="#F87171" opacity="0.3" font-size="24">
    <text x="660" y="130">?</text>
    <text x="690" y="200">?</text>
    <text x="100" y="140">?</text>
  </g>
  <text x="400" y="370" font-family="Arial" font-size="18" fill="#2DD4BF" text-anchor="middle" font-weight="bold">Accept-All in NeverBounce</text>
  <text x="400" y="400" font-family="Arial" font-size="14" fill="#F87171" text-anchor="middle" opacity="0.7">What Does Catch-All Mean?</text>
</svg>