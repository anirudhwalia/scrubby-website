<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Prospect list / spreadsheet -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="260" height="280" rx="10" fill="none" stroke="#334155" stroke-width="2.5"/>
    <line x1="0" y1="40" x2="260" y2="40" stroke="#334155" stroke-width="1.5"/>
    <text x="130" y="27" font-family="system-ui" font-size="14" fill="#94a3b8" font-weight="bold" text-anchor="middle">PROSPECT LIST</text>
    <!-- Row 1 - valid -->
    <rect x="18" y="58" width="16" height="16" rx="3" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M21 66 L25 70 L31 62" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="46" y1="66" x2="200" y2="66" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="224" cy="66" r="6" fill="#22c55e" opacity="0.3"/><circle cx="224" cy="66" r="3" fill="#22c55e"/>
    <!-- Row 2 - valid -->
    <rect x="18" y="90" width="16" height="16" rx="3" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M21 98 L25 102 L31 94" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="46" y1="98" x2="180" y2="98" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="224" cy="98" r="6" fill="#22c55e" opacity="0.3"/><circle cx="224" cy="98" r="3" fill="#22c55e"/>
    <!-- Row 3 - invalid -->
    <rect x="18" y="122" width="16" height="16" rx="3" fill="none" stroke="#ef4444" stroke-width="2"/>
    <path d="M22 126 L30 134 M30 126 L22 134" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <line x1="46" y1="130" x2="190" y2="130" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="224" cy="130" r="6" fill="#ef4444" opacity="0.3"/><circle cx="224" cy="130" r="3" fill="#ef4444"/>
    <!-- Row 4 - catch-all / risky -->
    <rect x="18" y="154" width="16" height="16" rx="3" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="26" y="167" font-family="system-ui" font-size="14" fill="#f59e0b" text-anchor="middle" font-weight="bold">?</text>
    <line x1="46" y1="162" x2="210" y2="162" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="224" cy="162" r="6" fill="#f59e0b" opacity="0.3"/><circle cx="224" cy="162" r="3" fill="#f59e0b"/>
    <!-- Row 5 - catch-all / risky -->
    <rect x="18" y="186" width="16" height="16" rx="3" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="26" y="199" font-family="system-ui" font-size="14" fill="#f59e0b" text-anchor="middle" font-weight="bold">?</text>
    <line x1="46" y1="194" x2="170" y2="194" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="224" cy="194" r="6" fill="#f59e0b" opacity="0.3"/><circle cx="224" cy="194" r="3" fill="#f59e0b"/>
    <!-- Row 6 - valid -->
    <rect x="18" y="218" width="16" height="16" rx="3" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M21 226 L25 230 L31 222" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="46" y1="226" x2="220" y2="226" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="224" cy="226" r="6" fill="#22c55e" opacity="0.3"/><circle cx="224" cy="226" r="3" fill="#22c55e"/>
    <!-- Row 7 - catch-all recovered -->
    <rect x="18" y="250" width="16" height="16" rx="3" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <path d="M21 258 L25 262 L31 254" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="46" y1="258" x2="195" y2="258" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="224" cy="258" r="6" fill="#22d3ee" opacity="0.3"/><circle cx="224" cy="258" r="3" fill="#22d3ee"/>
  </g>
  <!-- Arrow from list to funnel -->
  <path d="M340 210 L410 210" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>
  <!-- Verification funnel -->
  <g transform="translate(420, 80)">
    <path d="M0 0 L180 0 L140 120 L40 120 Z" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M40 120 L70 240 L110 240 L140 120" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Funnel labels -->
    <text x="90" y="45" font-family="system-ui" font-size="11" fill="#94a3b8" text-anchor="middle">STANDARD</text>
    <text x="90" y="62" font-family="system-ui" font-size="11" fill="#94a3b8" text-anchor="middle">VERIFICATION</text>
    <line x1="30" y1="75" x2="150" y2="75" stroke="#334155" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="90" y="100" font-family="system-ui" font-size="11" fill="#22d3ee" text-anchor="middle" font-weight="bold">CATCH-ALL</text>
    <text x="90" y="117" font-family="system-ui" font-size="11" fill="#22d3ee" text-anchor="middle" font-weight="bold">VALIDATION</text>
    <!-- Output -->
    <text x="90" y="218" font-family="system-ui" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="bold">CLEAN</text>
    <text x="90" y="235" font-family="system-ui" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="bold">LEADS</text>
  </g>
  <!-- Stats -->
  <g transform="translate(640, 130)">
    <text x="0" y="0" font-family="system-ui" font-size="32" fill="#22c55e" font-weight="bold">+42%</text>
    <text x="0" y="22" font-family="system-ui" font-size="12" fill="#94a3b8">leads recovered</text>
    <text x="0" y="65" font-family="system-ui" font-size="28" fill="#22d3ee" font-weight="bold">&lt;1%</text>
    <text x="0" y="85" font-family="system-ui" font-size="12" fill="#94a3b8">bounce rate</text>
  </g>
  <!-- Title -->
  <text x="400" y="415" font-family="system-ui" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Cold Email Verification Done Right</text>
  <text x="400" y="438" font-family="system-ui" font-size="13" fill="#94a3b8" text-anchor="middle">scrubby.io</text>
  <!-- Decorative dots -->
  <g fill="#22d3ee" opacity="0.1">
    <circle cx="720" cy="60" r="2"/><circle cx="740" cy="60" r="2"/><circle cx="760" cy="60" r="2"/>
    <circle cx="720" cy="80" r="2"/><circle cx="740" cy="80" r="2"/><circle cx="760" cy="80" r="2"/>
    <circle cx="40" cy="400" r="2"/><circle cx="60" cy="400" r="2"/><circle cx="80" cy="400" r="2"/>
    <circle cx="40" cy="420" r="2"/><circle cx="60" cy="420" r="2"/><circle cx="80" cy="420" r="2"/>
  </g>
</svg>