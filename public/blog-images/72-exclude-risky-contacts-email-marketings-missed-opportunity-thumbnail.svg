<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Large 72% text -->
  <text x="400" y="180" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="100" font-weight="bold" opacity="0.2">72%</text>
  <!-- Pie chart sketch -->
  <circle cx="300" cy="200" r="80" fill="none" stroke="#2DD4BF" stroke-width="3"/>
  <path d="M300 120 A80 80 0 1 1 243 260" fill="none" stroke="#F87171" stroke-width="6" stroke-linecap="round"/>
  <!-- Arrow pointing to missed segment -->
  <line x1="230" y1="270" x2="180" y2="310" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <polygon points="175,315 185,308 178,305" fill="#F87171"/>
  <!-- Missed opportunity people icons -->
  <circle cx="540" cy="150" r="15" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
  <line x1="540" y1="165" x2="540" y2="200" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
  <line x1="525" y1="180" x2="555" y2="180" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
  <circle cx="600" cy="150" r="15" fill="none" stroke="#F87171" stroke-width="2" opacity="0.6"/>
  <line x1="600" y1="165" x2="600" y2="200" stroke="#F87171" stroke-width="2" opacity="0.6"/>
  <line x1="585" y1="180" x2="615" y2="180" stroke="#F87171" stroke-width="2" opacity="0.6"/>
  <circle cx="660" cy="150" r="15" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.3"/>
  <line x1="660" y1="165" x2="660" y2="200" stroke="#2DD4BF" stroke-width="2" opacity="0.3"/>
  <line x1="645" y1="180" x2="675" y2="180" stroke="#2DD4BF" stroke-width="2" opacity="0.3"/>
  <!-- Question marks -->
  <text x="540" y="240" fill="#F87171" font-family="sans-serif" font-size="20" opacity="0.5">?</text>
  <text x="600" y="240" fill="#2DD4BF" font-family="sans-serif" font-size="20" opacity="0.5">?</text>
  <text x="660" y="240" fill="#F87171" font-family="sans-serif" font-size="20" opacity="0.4">?</text>
  <!-- Warning triangle -->
  <path d="M500 270 L530 320 L470 320Z" fill="none" stroke="#F87171" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="500" y="315" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="18" font-weight="bold">!</text>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="20" font-weight="bold" opacity="0.9">72% Exclude Risky Contacts</text>
  <text x="400" y="410" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="14" opacity="0.7">Email Marketing's Missed Opportunity</text>
</svg>