<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Balance scale -->
  <line x1="400" y1="80" x2="400" y2="300" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <circle cx="400" cy="75" r="8" fill="none" stroke="#2DD4BF" stroke-width="2"/>
  <!-- Beam (slightly tilted) -->
  <line x1="200" y1="140" x2="600" y2="160" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <!-- Left pan (pros - lighter, higher) -->
  <path d="M150 140 L250 140 L230 200 L170 200 Z" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="200" y1="140" x2="200" y2="140" stroke="#2DD4BF" stroke-width="2"/>
  <!-- Checkmark in left pan -->
  <path d="M180 165 L195 180 L220 155" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right pan (cons - heavier, lower) -->
  <path d="M550 160 L650 160 L630 220 L570 220 Z" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- X mark in right pan -->
  <line x1="585" y1="175" x2="615" y2="205" stroke="#F87171" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="615" y1="175" x2="585" y2="205" stroke="#F87171" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chains/strings -->
  <line x1="200" y1="140" x2="150" y2="140" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="200" y1="140" x2="250" y2="140" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="600" y1="160" x2="550" y2="160" stroke="#F87171" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="600" y1="160" x2="650" y2="160" stroke="#F87171" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Labels -->
  <text x="200" y="240" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="16" opacity="0.6">PROS</text>
  <text x="600" y="260" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="16" opacity="0.6">CONS</text>
  <!-- Base -->
  <path d="M360 300 L440 300 L420 330 L380 330 Z" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
  <!-- Small envelope -->
  <rect x="370" y="360" width="60" height="38" rx="3" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M371 361 L400 383 L429 361" fill="none" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <text x="400" y="430" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="14" opacity="0.6">Free Email: Pros vs Cons</text>
</svg>