    <path d="M30 40 L37 47 L52 32" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title -->
  <text x="400" y="415" font-family="system-ui" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Pre-Launch Email Deliverability Checklist</text>
  <text x="400" y="438" font-family="system-ui" font-size="13" fill="#94a3b8" text-anchor="middle">scrubby.io</text>
  <!-- Decorative dots -->
  <g fill="#22d3ee" opacity="0.1">
