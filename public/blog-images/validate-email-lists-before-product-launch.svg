  <line x1="140" y1="150" x2="310" y2="150" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="110" y="175" width="18" height="18" rx="3" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <path d="M113 184 L117 188 L125 179" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
