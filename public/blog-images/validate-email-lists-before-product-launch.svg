  <rect x="110" y="210" width="18" height="18" rx="3" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <path d="M113 219 L117 223 L125 214" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="140" y1="220" x2="330" y2="220" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="110" y="245" width="18" height="18" rx="3" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <line x1="140" y1="255" x2="270" y2="255" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="110" y="280" width="18" height="18" rx="3" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <line x1="140" y1="290" x2="320" y2="290" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Email envelope -->
  <g transform="translate(480, 100)">
    <rect x="0" y="15" width="80" height="55" rx="5" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
    <path d="M2 18 L40 48 L78 18" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M52 38 L68 25" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Rocket -->
  <g transform="translate(560, 180)">
    <path d="M40 10 C40 10 50 -5 60 10 L65 50 C65 50 52 42 35 50 Z" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="50" cy="25" r="6" fill="none" stroke="#ef4444" stroke-width="2"/>
    <path d="M35 50 L30 65 L42 55" stroke="#ef4444" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M65 50 L70 65 L58 55" stroke="#ef4444" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
