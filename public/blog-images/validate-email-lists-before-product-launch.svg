  <line x1="100" y1="120" x2="340" y2="120" stroke="#334155" stroke-width="1.5"/>
  <text x="160" y="108" font-family="system-ui" font-size="15" fill="#94a3b8" font-weight="bold">PRE-LAUNCH</text>
