<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Server/gate -->
  <rect x="340" y="70" width="120" height="260" rx="6" stroke="#2DD4BF" stroke-width="2.5" fill="none" transform="rotate(0.5 400 200)"/>
  <!-- Gate bars -->
  <g stroke="#2DD4BF" stroke-width="2" opacity="0.5">
    <line x1="360" y1="70" x2="360" y2="330"/>
    <line x1="380" y1="70" x2="380" y2="330"/>
    <line x1="400" y1="70" x2="400" y2="330"/>
    <line x1="420" y1="70" x2="420" y2="330"/>
    <line x1="440" y1="70" x2="440" y2="330"/>
  </g>
  <!-- STOP hand / pause -->
  <g transform="translate(370, 160)">
    <rect width="60" height="40" rx="4" stroke="#F87171" stroke-width="2.5" fill="#F87171" fill-opacity="0.15"/>
    <line x1="20" y1="15" x2="20" y2="25" stroke="#F87171" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="15" x2="40" y2="25" stroke="#F87171" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Email approaching from left (legitimate - will retry) -->
  <g transform="translate(100, 120)" stroke="#2DD4BF" stroke-width="2" fill="none">
    <rect width="50" height="35" rx="3" transform="rotate(-3 25 17)"/>
    <path d="M2 2 L25 20 L48 2"/>
  </g>
  <path d="M155 137 L200 140 L250 142" stroke="#2DD4BF" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.6"/>
  <!-- Checkmark for legitimate -->
  <circle cx="270" cy="142" r="12" stroke="#2DD4BF" stroke-width="2" fill="none"/>
  <path d="M263 142 L268 148 L278 136" stroke="#2DD4BF" stroke-width="2" fill="none"/>
  <!-- Arrow going through gate -->
  <path d="M290 142 L330 145" stroke="#2DD4BF" stroke-width="2" fill="none"/>
  <path d="M465 145 L540 142" stroke="#2DD4BF" stroke-width="2" fill="none" stroke-dasharray="5 3"/>
  <!-- Spam email from left (blocked) -->
  <g transform="translate(100, 250)" stroke="#F87171" stroke-width="2" fill="none">
    <rect width="50" height="35" rx="3" transform="rotate(2 25 17)"/>
    <path d="M2 2 L25 20 L48 2"/>
    <text x="25" y="24" font-family="Arial" font-size="10" fill="#F87171" text-anchor="middle">SPAM</text>
  </g>
  <path d="M155 267 L250 265" stroke="#F87171" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.6"/>
  <!-- X for blocked -->
  <circle cx="270" cy="265" r="12" stroke="#F87171" stroke-width="2" fill="none"/>
  <path d="M263 258 L277 272 M277 258 L263 272" stroke="#F87171" stroke-width="2" fill="none"/>
  <!-- Clock/timer icon -->
  <g transform="translate(560, 110)">
    <circle cx="25" cy="25" r="22" stroke="#2DD4BF" stroke-width="2" fill="none"/>
    <line x1="25" y1="25" x2="25" y2="12" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
    <line x1="25" y1="25" x2="35" y2="30" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="585" y="175" font-family="Arial" font-size="11" fill="#2DD4BF" text-anchor="middle" opacity="0.7">WAIT</text>
  <text x="400" y="380" font-family="Arial" font-size="20" fill="#2DD4BF" text-anchor="middle" font-weight="bold">Greylisting</text>
  <text x="400" y="410" font-family="Arial" font-size="14" fill="#F87171" text-anchor="middle" opacity="0.7">Email Deliverability Explained</text>
</svg>