<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f8f5f0" rx="8"/>

  <!-- Facebook lead form -->
  <rect x="60" y="80" width="200" height="250" rx="10" fill="none" stroke="#1877f2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- form header -->
  <rect x="60" y="80" width="200" height="40" rx="10" fill="#1877f2" opacity="0.12"/>
  <text x="160" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1877f2" font-weight="bold">Lead Ad Form</text>
  <!-- form fields -->
  <rect x="80" y="135" width="160" height="20" rx="4" fill="#1877f2" opacity="0.08" stroke="#1877f2" stroke-width="1" opacity="0.3"/>
  <text x="90" y="149" font-family="Georgia, serif" font-size="9" fill="#555">name@old-email.com</text>
  <text x="80" y="130" font-family="Georgia, serif" font-size="8" fill="#888">Email (pre-filled)</text>
  <rect x="80" y="175" width="160" height="20" rx="4" fill="#1877f2" opacity="0.08" stroke="#1877f2" stroke-width="1" opacity="0.3"/>
  <text x="90" y="189" font-family="Georgia, serif" font-size="9" fill="#555">Jane Smith</text>
  <text x="80" y="170" font-family="Georgia, serif" font-size="8" fill="#888">Full Name</text>
  <!-- submit button -->
  <rect x="80" y="215" width="160" height="28" rx="6" fill="#1877f2" opacity="0.85"/>
  <text x="160" y="234" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white">Submit</text>
  <!-- warning icons on form -->
  <text x="245" y="150" font-family="Georgia, serif" font-size="14" fill="#e63946">⚠</text>
  <text x="90" y="270" font-family="Georgia, serif" font-size="8" fill="#e63946">typos · disposable · outdated</text>
  <!-- tap finger -->
  <circle cx="160" cy="290" r="12" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="160" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#888">tap</text>

  <!-- arrow from form to validation -->
  <path d="M270 210 L340 210" fill="none" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,4"/>
  <path d="M333 203 L342 210 L333 217" fill="none" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- validation funnel -->
  <path d="M370 120 L470 120 L440 200 L400 200 Z" fill="none" stroke="#52b788" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="420" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#52b788">validate</text>
  <!-- filter lines inside funnel -->
  <line x1="385" y1="160" x2="455" y2="160" stroke="#52b788" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="392" y1="175" x2="448" y2="175" stroke="#52b788" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- rejected drops -->
  <circle cx="380" y="230" r="4" fill="#e63946" opacity="0.4"/>
  <circle cx="395" y="238" r="3" fill="#e63946" opacity="0.3"/>
  <circle cx="410" y="245" r="4" fill="#e63946" opacity="0.35"/>
  <text x="395" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#e63946">invalid removed</text>

  <!-- arrow from funnel to clean list -->
  <path d="M472 165 L520 165" fill="none" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,4"/>
  <path d="M513 158 L522 165 L513 172" fill="none" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- clean list / inbox -->
  <rect x="530" y="90" width="210" height="200" rx="8" fill="none" stroke="#2d6a4f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="530" y="90" width="210" height="35" rx="8" fill="#2d6a4f" opacity="0.08"/>
  <text x="635" y="113" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2d6a4f" font-weight="bold">Clean Lead List</text>
  <!-- verified rows -->
  <rect x="550" y="140" width="130" height="6" rx="3" fill="#52b788" opacity="0.4"/>
  <path d="M695 138 L700 144 L710 133" fill="none" stroke="#52b788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="550" y="158" width="110" height="6" rx="3" fill="#52b788" opacity="0.4"/>
  <path d="M695 156 L700 162 L710 151" fill="none" stroke="#52b788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="550" y="176" width="140" height="6" rx="3" fill="#52b788" opacity="0.4"/>
  <path d="M695 174 L700 180 L710 169" fill="none" stroke="#52b788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="550" y="194" width="120" height="6" rx="3" fill="#52b788" opacity="0.4"/>
  <path d="M695 192 L700 198 L710 187" fill="none" stroke="#52b788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="550" y="212" width="135" height="6" rx="3" fill="#52b788" opacity="0.4"/>
  <path d="M695 210 L700 216 L710 205" fill="none" stroke="#52b788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bounce rate -->
  <rect x="555" y="240" width="180" height="22" rx="4" fill="#52b788" opacity="0.1" stroke="#52b788" stroke-width="1.5"/>
  <text x="645" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2d6a4f">bounce rate: 0.6%</text>

  <!-- decorative dots -->
  <circle cx="50" cy="380" r="4" fill="#1877f2" opacity="0.2"/>
  <circle cx="300" cy="370" r="3" fill="#52b788" opacity="0.25"/>
  <circle cx="720" cy="360" r="5" fill="#2d6a4f" opacity="0.2"/>

  <!-- bottom text -->
  <text x="400" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#333" font-style="italic">Facebook Leads Need Scrubbing</text>
  <text x="400" y="405" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#777">pre-filled forms · dirty data · validate before you nurture</text>
</svg>
