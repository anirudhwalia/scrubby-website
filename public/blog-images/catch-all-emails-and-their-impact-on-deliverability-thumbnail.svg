<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Big funnel catching emails -->
  <path d="M300 120 L500 120 L440 280 L360 280 Z" stroke="#2DD4BF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Grid lines in funnel -->
  <path d="M320 160 L480 160" stroke="#2DD4BF" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M340 200 L460 200" stroke="#2DD4BF" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M350 240 L450 240" stroke="#2DD4BF" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Envelopes going in -->
  <rect x="330" y="80" width="24" height="16" rx="2" stroke="#F87171" stroke-width="1.5" fill="none" transform="rotate(-5 342 88)"/>
  <rect x="380" y="75" width="24" height="16" rx="2" stroke="#2DD4BF" stroke-width="1.5" fill="none"/>
  <rect x="430" y="82" width="24" height="16" rx="2" stroke="#F87171" stroke-width="1.5" fill="none" transform="rotate(7 442 90)"/>
  <!-- Output arrow pointing down -->
  <path d="M400 280 L400 330" stroke="#F87171" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M390 320 L400 335 L410 320" stroke="#F87171" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Deliverability meter -->
  <rect x="340" y="350" width="120" height="20" rx="10" stroke="#2DD4BF" stroke-width="2" fill="none"/>
  <rect x="342" y="352" width="55" height="16" rx="8" fill="#F87171" opacity="0.6"/>
  <!-- Warning triangle -->
  <path d="M560 180 L580 220 L540 220 Z" stroke="#F87171" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="560" y1="195" x2="560" y2="208" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <circle cx="560" cy="214" r="2" fill="#F87171"/>
  <!-- Bounce arrows -->
  <path d="M230 200 Q220 170 240 155" stroke="#F87171" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M235 160 L240 155 L243 165" stroke="#F87171" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Label -->
  <text x="400" y="415" font-family="monospace" font-size="12" fill="#2DD4BF" text-anchor="middle" opacity="0.7">CATCH-ALL IMPACT</text>
</svg>