<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Shield outline -->
  <path d="M400 60 L520 100 L520 220 Q520 320 400 370 Q280 320 280 220 L280 100 Z" stroke="#2DD4BF" stroke-width="3" fill="none" transform="rotate(-1 400 215)"/>
  <!-- Checkmark inside shield -->
  <path d="M350 200 L385 240 L450 170" stroke="#F87171" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Lock icon -->
  <g transform="translate(100, 120)" stroke="#2DD4BF" stroke-width="2.5" fill="none">
    <rect x="5" y="25" width="40" height="30" rx="3" transform="rotate(-2 25 40)"/>
    <path d="M12 25 L12 15 Q12 0 25 0 Q38 0 38 15 L38 25"/>
    <circle cx="25" cy="40" r="3" fill="#F87171"/>
  </g>
  <!-- SPF DKIM DMARC labels -->
  <g font-family="Arial" font-size="14" fill="#2DD4BF" opacity="0.8">
    <text x="600" y="130" transform="rotate(3 600 130)">SPF</text>
    <text x="620" y="190" transform="rotate(-2 620 190)">DKIM</text>
    <text x="610" y="250" transform="rotate(1 610 250)">DMARC</text>
  </g>
  <!-- Connecting lines from labels to shield -->
  <g stroke="#2DD4BF" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5">
    <line x1="595" y1="125" x2="525" y2="140"/>
    <line x1="615" y1="185" x2="525" y2="200"/>
    <line x1="605" y1="245" x2="525" y2="250"/>
  </g>
  <!-- Email icon -->
  <g transform="translate(100, 260)" stroke="#F87171" stroke-width="2" fill="none">
    <rect width="50" height="35" rx="3" transform="rotate(2 25 17)"/>
    <path d="M2 2 L25 20 L48 2"/>
  </g>
  <!-- Dots/particles -->
  <g fill="#F87171" opacity="0.4">
    <circle cx="200" cy="80" r="2"/>
    <circle cx="700" cy="100" r="2.5"/>
    <circle cx="680" cy="330" r="2"/>
    <circle cx="150" cy="350" r="3"/>
  </g>
  <text x="400" y="410" font-family="Arial" font-size="16" fill="#2DD4BF" text-anchor="middle" opacity="0.8">Email Authentication &amp; Sender Reputation</text>
</svg>