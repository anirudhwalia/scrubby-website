  <path d="M280 200 L280 310 Q281 330 300 330 L500 331 Q520 330 520 310 L520 200" stroke="#2DD4BF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M280 200 L320 250 L480 250 L520 200" stroke="#2DD4BF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Email flying into inbox -->
  <rect x="370" y="140" width="60" height="40" rx="3" stroke="#F87171" stroke-width="2.5" fill="none" transform="rotate(-5 400 160)"/>
  <path d="M370 140 L400 165 L430 140" stroke="#F87171" stroke-width="2" fill="none" transform="rotate(-5 400 160)"/>
  <!-- Motion lines -->
  <path d="M360 155 L340 150" stroke="#F87171" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M365 170 L345 170" stroke="#F87171" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- 2025 text -->
  <text x="400" y="305" font-family="monospace" font-size="36" fill="#2DD4BF" text-anchor="middle" opacity="0.4">2025</text>
  <!-- Checkmark -->
  <path d="M540 160 L560 185 L600 130" stroke="#2DD4BF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shield -->
  <path d="M200 140 L200 190 Q200 220 230 230 Q260 220 260 190 L260 140 Q230 130 200 140" stroke="#2DD4BF" stroke-width="2" fill="none"/>
  <path d="M220 170 L228 182 L248 158" stroke="#2DD4BF" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Gauge -->
  <path d="M580 280 Q580 240 620 240 Q660 240 660 280" stroke="#F87171" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="620" y1="280" x2="640" y2="255" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="400" y="390" font-family="monospace" font-size="12" fill="#2DD4BF" text-anchor="middle" opacity="0.7">DELIVERABILITY IN 2025</text>
