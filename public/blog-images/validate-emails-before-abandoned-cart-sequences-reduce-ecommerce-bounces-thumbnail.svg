<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f7f5f0"/>
  <!-- Shopping cart body -->
  <path d="M152 165 L178 165 L205 285 L365 285 L390 195 L195 193" fill="none" stroke="#3a6b8f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Cart basket lines -->
  <line x1="198" y1="215" x2="385" y2="213" stroke="#3a6b8f" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="202" y1="242" x2="382" y2="240" stroke="#3a6b8f" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="250" y1="193" x2="262" y2="285" stroke="#3a6b8f" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="305" y1="193" x2="313" y2="285" stroke="#3a6b8f" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="350" y1="194" x2="355" y2="285" stroke="#3a6b8f" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Cart wheels -->
  <circle cx="238" cy="305" r="14" fill="none" stroke="#3a6b8f" stroke-width="2.5" opacity="0.8"/>
  <circle cx="345" cy="305" r="14" fill="none" stroke="#3a6b8f" stroke-width="2.5" opacity="0.8"/>
  <!-- Dotted arrow from cart to envelope -->
  <path d="M410 235 Q460 220 490 235" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round" opacity="0.55"/>
  <polygon points="487,226 498,235 487,244" fill="#888" opacity="0.5"/>
  <!-- Envelope -->
  <rect x="505" y="175" width="180" height="118" rx="5" fill="rgba(58,107,143,0.06)" stroke="#3a6b8f" stroke-width="2.8" stroke-linecap="round" opacity="0.88"/>
  <path d="M508 178 L595 238 L682 178" fill="none" stroke="#3a6b8f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
  <!-- Lines inside envelope suggesting content -->
  <line x1="530" y1="262" x2="648" y2="262" stroke="#3a6b8f" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="530" y1="276" x2="620" y2="276" stroke="#3a6b8f" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Validation badge on envelope -->
  <circle cx="664" cy="272" r="26" fill="rgba(42,150,100,0.1)" stroke="#2a9664" stroke-width="2.8" opacity="0.9"/>
  <path d="M650 272 L660 283 L679 258" fill="none" stroke="#2a9664" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bounce X bubble for bad email -->
  <circle cx="525" cy="338" r="20" fill="rgba(196,74,56,0.08)" stroke="#c44a38" stroke-width="2.2" opacity="0.75"/>
  <line x1="514" y1="327" x2="536" y2="349" stroke="#c44a38" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
  <line x1="536" y1="327" x2="514" y2="349" stroke="#c44a38" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
  <!-- Small bounce arc -->
  <path d="M530 360 Q530 390 555 390 Q580 390 575 365" fill="none" stroke="#c44a38" stroke-width="1.8" stroke-dasharray="4 3" stroke-linecap="round" opacity="0.55"/>
  <text x="558" y="412" font-family="sans-serif" font-size="11" fill="#c44a38" opacity="0.6" text-anchor="middle">bounced</text>
  <!-- Floating @ symbols -->
  <text x="130" y="120" font-family="Georgia, serif" font-size="24" fill="#3a6b8f" opacity="0.18" transform="rotate(-12 130 120)">@</text>
  <text x="680" y="140" font-family="Georgia, serif" font-size="19" fill="#2a9664" opacity="0.2" transform="rotate(8 680 140)">@</text>
  <text x="440" y="110" font-family="Georgia, serif" font-size="15" fill="#3a6b8f" opacity="0.15">@</text>
  <!-- Caption -->
  <text x="400" y="432" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#555" opacity="0.65">validate at checkout, recover more carts</text>
</svg>
