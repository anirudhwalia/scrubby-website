<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Rocket / arrow going up -->
  <path d="M400 320 L400 140" stroke="#2DD4BF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M380 170 L400 130 L420 170" stroke="#2DD4BF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Flame trail -->
  <path d="M395 320 Q390 345 400 360 Q410 345 405 320" stroke="#F87171" stroke-width="2" fill="none"/>
  <path d="M392 340 Q388 360 400 375 Q412 360 408 340" stroke="#F87171" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Envelope at arrow tip -->
  <rect x="375" y="100" width="50" height="35" rx="3" stroke="#2DD4BF" stroke-width="2" fill="none"/>
  <path d="M375 100 L400 120 L425 100" stroke="#2DD4BF" stroke-width="2" fill="none"/>
  <!-- Bar chart showing growth -->
  <rect x="220" y="280" width="30" height="60" rx="2" stroke="#2DD4BF" stroke-width="2" fill="none" opacity="0.5"/>
  <rect x="260" y="250" width="30" height="90" rx="2" stroke="#2DD4BF" stroke-width="2" fill="none" opacity="0.6"/>
  <rect x="300" y="220" width="30" height="120" rx="2" stroke="#F87171" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Right side checkmarks -->
  <path d="M500 180 L510 195 L530 165" stroke="#2DD4BF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M500 220 L510 235 L530 205" stroke="#2DD4BF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M500 260 L510 275 L530 245" stroke="#F87171" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Label -->
  <text x="400" y="410" font-family="monospace" font-size="13" fill="#2DD4BF" text-anchor="middle" opacity="0.7">BOOST DELIVERABILITY</text>
</svg>