<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Sketchy form outline -->
  <rect x="220" y="50" width="360" height="280" rx="8" stroke="#2DD4BF" stroke-width="2.5" fill="none" transform="rotate(-0.8 400 190)"/>
  <!-- Form fields -->
  <g stroke="#2DD4BF" stroke-width="1.8" fill="none" opacity="0.8">
    <rect x="260" y="90" width="280" height="32" rx="4" transform="rotate(0.5 400 106)"/>
    <rect x="260" y="140" width="280" height="32" rx="4" transform="rotate(-0.3 400 156)"/>
    <rect x="260" y="190" width="280" height="32" rx="4" transform="rotate(0.7 400 206)"/>
  </g>
  <!-- Input field lines (text placeholders) -->
  <line x1="275" y1="108" x2="370" y2="107" stroke="#2DD4BF" stroke-width="1.5" opacity="0.4"/>
  <line x1="275" y1="158" x2="420" y2="157" stroke="#2DD4BF" stroke-width="1.5" opacity="0.4"/>
  <line x1="275" y1="208" x2="350" y2="207" stroke="#2DD4BF" stroke-width="1.5" opacity="0.4"/>
  <!-- CTA Button -->
  <rect x="300" y="250" width="200" height="45" rx="22" stroke="#F87171" stroke-width="3" fill="#F87171" fill-opacity="0.15" transform="rotate(-1 400 272)"/>
  <text x="400" y="278" font-family="Arial" font-size="16" fill="#F87171" text-anchor="middle" font-weight="bold">SIGN UP</text>
  <!-- Arrow pointing to form -->
  <g stroke="#F87171" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M120 180 Q160 160 210 170"/>
    <path d="M200 162 L212 170 L202 180"/>
  </g>
  <!-- Cursor sketch -->
  <g transform="translate(560, 105)" stroke="#F87171" stroke-width="2" fill="none">
    <path d="M0 0 L0 22 L6 17 L12 28 L16 26 L10 15 L18 14 Z"/>
  </g>
  <!-- Conversion arrows going up -->
  <g transform="translate(640, 100)" stroke="#2DD4BF" stroke-width="2.5" fill="none" stroke-linecap="round">
    <line x1="0" y1="200" x2="0" y2="50"/>
    <path d="M-10 65 L0 48 L10 65"/>
    <line x1="40" y1="200" x2="40" y2="80"/>
    <path d="M30 95 L40 78 L50 95"/>
    <line x1="80" y1="200" x2="80" y2="30"/>
    <path d="M70 45 L80 28 L90 45"/>
  </g>
  <!-- Sparkles -->
  <g fill="#F87171" opacity="0.5">
    <circle cx="180" cy="80" r="2.5"/>
    <circle cx="640" cy="60" r="2"/>
    <circle cx="160" cy="300" r="3"/>
  </g>
  <text x="400" y="380" font-family="Arial" font-size="18" fill="#2DD4BF" text-anchor="middle" opacity="0.9">High-Converting Lead Capture</text>
  <path d="M240 390 Q400 396 560 388" stroke="#2DD4BF" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>