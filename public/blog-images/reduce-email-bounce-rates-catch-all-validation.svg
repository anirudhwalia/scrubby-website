<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Bounce arrow going down -->
  <path d="M200 180 L200 380 L280 300" stroke="url(#accent)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="200" cy="160" r="20" fill="#ef4444" opacity="0.8"/>
  <text x="192" y="166" font-family="system-ui" font-size="16" fill="white" font-weight="bold">!</text>
  <!-- Success checkmark -->
  <circle cx="500" cy="280" r="60" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.3"/>
  <path d="M470 280 L490 300 L530 260" stroke="#22d3ee" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Percentage gauge -->
  <path d="M750 350 A100 100 0 1 1 950 350" stroke="#334155" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M750 350 A100 100 0 1 1 945 330" stroke="url(#accent)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <text x="850" y="320" font-family="system-ui" font-size="36" fill="white" text-anchor="middle" font-weight="bold">&lt;2%</text>
  <text x="850" y="345" font-family="system-ui" font-size="14" fill="#94a3b8" text-anchor="middle">BOUNCE RATE</text>
  <!-- Title -->
  <text x="600" y="500" font-family="system-ui" font-size="28" fill="white" text-anchor="middle" font-weight="bold">Reduce Bounce Rates With Catch-All Validation</text>
  <text x="600" y="535" font-family="system-ui" font-size="16" fill="#94a3b8" text-anchor="middle">scrubby.io</text>
  <!-- Grid dots -->
  <g fill="#22d3ee" opacity="0.1">
    <circle cx="100" cy="100" r="2"/><circle cx="140" cy="100" r="2"/><circle cx="180" cy="100" r="2"/>
    <circle cx="100" cy="140" r="2"/><circle cx="140" cy="140" r="2"/><circle cx="180" cy="140" r="2"/>
    <circle cx="1020" cy="100" r="2"/><circle cx="1060" cy="100" r="2"/><circle cx="1100" cy="100" r="2"/>
    <circle cx="1020" cy="140" r="2"/><circle cx="1060" cy="140" r="2"/><circle cx="1100" cy="140" r="2"/>
  </g>
</svg>