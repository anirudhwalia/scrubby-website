<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Magnifying glass over contact card -->
  <rect x="250" y="100" width="220" height="140" rx="8" fill="none" stroke="#2DD4BF" stroke-width="2.5"/>
  <!-- Contact card details -->
  <circle cx="310" cy="155" r="20" fill="none" stroke="#F87171" stroke-width="2"/>
  <line x1="350" y1="140" x2="430" y2="140" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="350" y1="158" x2="410" y2="158" stroke="#F87171" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="350" y1="175" x2="440" y2="175" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- @ highlighted -->
  <text x="300" y="215" fill="#F87171" font-family="sans-serif" font-size="18" opacity="0.6">@</text>
  <line x1="320" y1="210" x2="440" y2="210" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 2" opacity="0.5"/>
  <!-- Large magnifying glass -->
  <circle cx="530" cy="180" r="60" fill="none" stroke="#2DD4BF" stroke-width="3" opacity="0.8"/>
  <line x1="572" y1="222" x2="620" y2="270" stroke="#2DD4BF" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <!-- Eye icon inside magnifying glass -->
  <ellipse cx="530" cy="180" rx="25" ry="15" fill="none" stroke="#F87171" stroke-width="2"/>
  <circle cx="530" cy="180" r="8" fill="none" stroke="#F87171" stroke-width="2"/>
  <circle cx="530" cy="180" r="3" fill="#F87171" opacity="0.5"/>
  <!-- LinkedIn-like icon -->
  <rect x="160" y="260" width="30" height="30" rx="4" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.5"/>
  <text x="175" y="282" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="16" font-weight="bold" opacity="0.5">in</text>
  <!-- Web icon -->
  <circle cx="250" cy="275" r="15" fill="none" stroke="#F87171" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="250" cy="275" rx="8" ry="15" fill="none" stroke="#F87171" stroke-width="1" opacity="0.3"/>
  <line x1="235" y1="275" x2="265" y2="275" stroke="#F87171" stroke-width="1" opacity="0.3"/>
  <!-- Sparkles -->
  <path d="M680 150 L685 140 L690 150 L685 160Z" fill="#F87171" opacity="0.4"/>
  <circle cx="140" cy="150" r="3" fill="#2DD4BF" opacity="0.4"/>
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="22" font-weight="bold" opacity="0.9">Find Work Email Addresses</text>
  <text x="400" y="400" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="14" opacity="0.7">Best Methods &amp; Tools</text>
</svg>