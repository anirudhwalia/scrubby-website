<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Template cards stacked -->
  <rect x="180" y="80" width="200" height="140" rx="8" fill="none" stroke="#2DD4BF" stroke-width="2.5" transform="rotate(-5 280 150)" stroke-linecap="round"/>
  <rect x="220" y="90" width="200" height="140" rx="8" fill="none" stroke="#F87171" stroke-width="2.5" transform="rotate(2 320 160)" stroke-linecap="round"/>
  <rect x="260" y="100" width="200" height="140" rx="8" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <!-- Template content lines -->
  <line x1="280" y1="125" x2="380" y2="125" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="280" y1="145" x2="430" y2="145" stroke="#F87171" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="280" y1="160" x2="410" y2="160" stroke="#F87171" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="280" y1="175" x2="390" y2="175" stroke="#F87171" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <rect x="280" y="195" width="60" height="22" rx="4" fill="none" stroke="#2DD4BF" stroke-width="2"/>
  <!-- Star rating -->
  <path d="M540 130 L548 150 L570 152 L553 167 L558 188 L540 178 L522 188 L527 167 L510 152 L532 150Z" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Number 5 -->
  <text x="620" y="200" fill="#2DD4BF" font-family="sans-serif" font-size="80" font-weight="bold" opacity="0.15">5</text>
  <!-- Pencil sketch -->
  <line x1="580" y1="260" x2="640" y2="200" stroke="#F87171" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="640,200 648,195 642,205" fill="#F87171" opacity="0.6"/>
  <!-- Sparkles -->
  <circle cx="150" cy="300" r="3" fill="#2DD4BF" opacity="0.5"/>
  <circle cx="680" cy="100" r="4" fill="#F87171" opacity="0.4"/>
  <path d="M700 280 L705 270 L710 280 L705 290Z" fill="#2DD4BF" opacity="0.3"/>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="22" font-weight="bold" opacity="0.9">5 Best Email Templates</text>
  <text x="400" y="410" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="14" opacity="0.7">for 2024</text>
</svg>