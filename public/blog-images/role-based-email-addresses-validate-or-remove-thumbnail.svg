<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Role-based email addresses">
  <rect width="800" height="450" fill="#f4f8f6"/>
  <path d="M70 90 Q120 70 180 88" stroke="#1f9d6b" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- envelope 1: info@ -->
  <g transform="rotate(-4 230 160)">
    <rect x="150" y="120" width="200" height="120" rx="8" fill="#ffffff" stroke="#1f4d3a" stroke-width="3"/>
    <path d="M150 130 L250 195 L350 130" fill="none" stroke="#1f4d3a" stroke-width="3" stroke-linecap="round"/>
    <text x="250" y="225" font-family="Comic Sans MS, cursive" font-size="22" fill="#1f9d6b" text-anchor="middle">info@</text>
  </g>
  <!-- envelope 2: sales@ -->
  <g transform="rotate(5 560 175)">
    <rect x="460" y="135" width="200" height="120" rx="8" fill="#ffffff" stroke="#1f4d3a" stroke-width="3"/>
    <path d="M460 145 L560 210 L660 145" fill="none" stroke="#1f4d3a" stroke-width="3" stroke-linecap="round"/>
    <text x="560" y="240" font-family="Comic Sans MS, cursive" font-size="22" fill="#1f9d6b" text-anchor="middle">sales@</text>
  </g>
  <!-- decision fork: keep vs cut -->
  <line x1="400" y1="300" x2="280" y2="380" stroke="#1f4d3a" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 9"/>
  <line x1="400" y1="300" x2="540" y2="380" stroke="#1f4d3a" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 9"/>
  <circle cx="400" cy="300" r="12" fill="#1f9d6b"/>
  <text x="250" y="408" font-family="Comic Sans MS, cursive" font-size="26" fill="#1f9d6b">keep?</text>
  <text x="500" y="408" font-family="Comic Sans MS, cursive" font-size="26" fill="#d9534f">cut?</text>
  <path d="M620 70 q30 10 10 40" stroke="#d9534f" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
