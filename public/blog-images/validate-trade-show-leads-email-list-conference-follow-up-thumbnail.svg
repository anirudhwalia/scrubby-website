<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f0f4f8" rx="8"/>

  <!-- Trade show booth sketch -->
  <rect x="280" y="100" width="240" height="160" fill="none" stroke="#2d3748" stroke-width="2.5" stroke-linejoin="round" rx="3" transform="rotate(-0.5 400 180)"/>
  <rect x="290" y="108" width="220" height="30" fill="#4a7cff" fill-opacity="0.15" stroke="#4a7cff" stroke-width="1.5" rx="2"/>
  <text x="400" y="128" font-family="sans-serif" font-size="13" fill="#2d3748" text-anchor="middle" font-weight="bold">CONFERENCE BOOTH</text>

  <!-- Table surface -->
  <line x1="270" y1="260" x2="530" y2="260" stroke="#2d3748" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="290" y1="260" x2="285" y2="290" stroke="#2d3748" stroke-width="2" stroke-linecap="round"/>
  <line x1="510" y1="260" x2="515" y2="290" stroke="#2d3748" stroke-width="2" stroke-linecap="round"/>

  <!-- Business cards on table -->
  <rect x="310" y="240" width="40" height="25" fill="#fff" stroke="#a0aec0" stroke-width="1.5" rx="2" transform="rotate(-8 330 252)"/>
  <rect x="340" y="238" width="40" height="25" fill="#fff" stroke="#a0aec0" stroke-width="1.5" rx="2" transform="rotate(5 360 250)"/>
  <rect x="370" y="242" width="40" height="25" fill="#fff" stroke="#a0aec0" stroke-width="1.5" rx="2" transform="rotate(-3 390 254)"/>

  <!-- Badge with lanyard -->
  <rect x="440" y="215" width="50" height="60" fill="#fff" stroke="#2d3748" stroke-width="1.8" rx="4"/>
  <line x1="465" y1="215" x2="465" y2="195" stroke="#e53e3e" stroke-width="2" stroke-linecap="round"/>
  <line x1="450" y1="195" x2="480" y2="195" stroke="#e53e3e" stroke-width="2" stroke-linecap="round"/>
  <circle cx="465" cy="232" r="8" fill="#e8edf3" stroke="#a0aec0" stroke-width="1"/>
  <line x1="448" y1="248" x2="482" y2="248" stroke="#a0aec0" stroke-width="1" stroke-linecap="round"/>
  <line x1="452" y1="255" x2="478" y2="255" stroke="#a0aec0" stroke-width="1" stroke-linecap="round"/>
  <line x1="455" y1="262" x2="475" y2="262" stroke="#a0aec0" stroke-width="1" stroke-linecap="round"/>

  <!-- Arrow from booth to email list -->
  <path d="M400 295 C400 320 320 320 250 340" fill="none" stroke="#4a7cff" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/>
  <polygon points="247,336 255,344 250,335" fill="#4a7cff"/>

  <!-- Email list / clipboard -->
  <rect x="130" y="320" width="130" height="100" fill="#fff" stroke="#2d3748" stroke-width="2" rx="4" transform="rotate(1 195 370)"/>
  <rect x="170" y="312" width="50" height="16" fill="#e8edf3" stroke="#2d3748" stroke-width="1.5" rx="8"/>

  <!-- Email rows with check/x -->
  <line x1="148" y1="345" x2="235" y2="345" stroke="#cbd5e0" stroke-width="1.2"/>
  <text x="152" y="342" font-family="monospace" font-size="9" fill="#2d3748">jane@corp.io</text>
  <circle cx="244" cy="340" r="6" fill="#48bb78" fill-opacity="0.2" stroke="#48bb78" stroke-width="1.5"/>
  <polyline points="240,340 243,343 248,337" fill="none" stroke="#48bb78" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="148" y1="362" x2="235" y2="362" stroke="#cbd5e0" stroke-width="1.2"/>
  <text x="152" y="359" font-family="monospace" font-size="9" fill="#2d3748">bob@old.co</text>
  <circle cx="244" cy="357" r="6" fill="#e53e3e" fill-opacity="0.2" stroke="#e53e3e" stroke-width="1.5"/>
  <line x1="241" y1="354" x2="247" y2="360" stroke="#e53e3e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="247" y1="354" x2="241" y2="360" stroke="#e53e3e" stroke-width="1.5" stroke-linecap="round"/>

  <line x1="148" y1="379" x2="235" y2="379" stroke="#cbd5e0" stroke-width="1.2"/>
  <text x="152" y="376" font-family="monospace" font-size="9" fill="#2d3748">ali@biz.com</text>
  <circle cx="244" cy="374" r="6" fill="#48bb78" fill-opacity="0.2" stroke="#48bb78" stroke-width="1.5"/>
  <polyline points="240,374 243,377 248,371" fill="none" stroke="#48bb78" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="148" y1="396" x2="235" y2="396" stroke="#cbd5e0" stroke-width="1.2"/>
  <text x="152" y="393" font-family="monospace" font-size="9" fill="#a0aec0">catch@all.co</text>
  <circle cx="244" cy="391" r="6" fill="#ecc94b" fill-opacity="0.2" stroke="#ecc94b" stroke-width="1.5"/>
  <text x="244" y="394" font-family="sans-serif" font-size="9" fill="#ecc94b" text-anchor="middle" font-weight="bold">?</text>

  <!-- Arrow to clean send -->
  <path d="M270 370 C310 370 340 370 370 365" fill="none" stroke="#48bb78" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/>
  <polygon points="373,362 374,369 367,363" fill="#48bb78"/>

  <!-- Clean send / envelope -->
  <rect x="380" y="340" width="80" height="55" fill="#fff" stroke="#2d3748" stroke-width="2" rx="3"/>
  <polyline points="380,340 420,368 460,340" fill="none" stroke="#2d3748" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="455" cy="345" r="10" fill="#48bb78" fill-opacity="0.2" stroke="#48bb78" stroke-width="1.5"/>
  <polyline points="450,345 454,349 461,341" fill="none" stroke="#48bb78" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decorative people silhouettes at booth -->
  <circle cx="340" cy="165" r="12" fill="none" stroke="#a0aec0" stroke-width="1.5"/>
  <line x1="340" y1="177" x2="340" y2="210" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="328" y1="195" x2="352" y2="195" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="400" cy="160" r="12" fill="none" stroke="#a0aec0" stroke-width="1.5"/>
  <line x1="400" y1="172" x2="400" y2="210" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="388" y1="190" x2="412" y2="190" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="460" cy="168" r="12" fill="none" stroke="#a0aec0" stroke-width="1.5"/>
  <line x1="460" y1="180" x2="460" y2="213" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="448" y1="198" x2="472" y2="198" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Title text -->
  <text x="640" y="355" font-family="sans-serif" font-size="15" fill="#2d3748" text-anchor="middle" font-weight="bold">Validate</text>
  <text x="640" y="375" font-family="sans-serif" font-size="15" fill="#2d3748" text-anchor="middle" font-weight="bold">Before You</text>
  <text x="640" y="395" font-family="sans-serif" font-size="15" fill="#4a7cff" text-anchor="middle" font-weight="bold">Follow Up</text>
</svg>
