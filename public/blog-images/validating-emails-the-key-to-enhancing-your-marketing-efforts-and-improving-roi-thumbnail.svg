<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Key icon (large, sketchy) -->
  <g transform="translate(150, 100)" stroke="#2DD4BF" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="50" cy="50" r="40" transform="rotate(-2 50 50)"/>
    <line x1="90" y1="50" x2="220" y2="52"/>
    <line x1="200" y1="52" x2="200" y2="80"/>
    <line x1="220" y1="52" x2="220" y2="75"/>
    <circle cx="50" cy="50" r="15" transform="rotate(1 50 50)"/>
  </g>
  <!-- Email envelope with checkmark -->
  <g transform="translate(480, 80)" stroke="#F87171" stroke-width="2.5" fill="none">
    <rect width="80" height="55" rx="4" transform="rotate(2 40 27)"/>
    <path d="M3 3 L40 30 L77 3"/>
    <!-- Checkmark badge -->
    <circle cx="72" cy="48" r="16" fill="#1a1a2e" stroke="#2DD4BF" stroke-width="2"/>
    <path d="M63 48 L69 55 L82 42" stroke="#2DD4BF" stroke-width="2.5"/>
  </g>
  <!-- Ascending line graph -->
  <g transform="translate(100, 240)">
    <line x1="0" y1="130" x2="600" y2="130" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="130" x2="0" y2="0" stroke="#2DD4BF" stroke-width="1.5" opacity="0.5"/>
    <path d="M20 110 L120 90 L230 60 L350 30 L480 5 L580 -10" stroke="#F87171" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Data points -->
    <circle cx="120" cy="90" r="4" fill="#F87171"/>
    <circle cx="230" cy="60" r="4" fill="#F87171"/>
    <circle cx="350" cy="30" r="4" fill="#F87171"/>
    <circle cx="480" cy="5" r="4" fill="#F87171"/>
  </g>
  <text x="400" y="410" font-family="Arial" font-size="18" fill="#2DD4BF" text-anchor="middle" opacity="0.9">Better Marketing. Higher ROI.</text>
  <path d="M240 420 Q400 425 560 418" stroke="#F87171" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>