<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f0f4f8" rx="8"/>

  <!-- LinkedIn card (left) -->
  <rect x="50" y="60" width="260" height="320" fill="#fff" stroke="#2d3748" stroke-width="2" rx="8"/>

  <!-- LinkedIn header -->
  <rect x="50" y="60" width="260" height="44" fill="#0a66c2" rx="8"/>
  <rect x="50" y="90" width="260" height="14" fill="#0a66c2"/>
  <text x="180" y="88" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">LinkedIn Lead Gen Form</text>

  <!-- LinkedIn logo icon -->
  <rect x="68" y="72" width="16" height="16" fill="#fff" rx="2"/>
  <text x="76" y="85" font-family="sans-serif" font-size="11" fill="#0a66c2" text-anchor="middle" font-weight="bold">in</text>

  <!-- Form fields -->
  <text x="75" y="130" font-family="sans-serif" font-size="10" fill="#64748b">Full Name</text>
  <rect x="75" y="135" width="210" height="26" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2" rx="4"/>
  <text x="85" y="153" font-family="monospace" font-size="9" fill="#334155">Sarah Chen</text>

  <text x="75" y="178" font-family="sans-serif" font-size="10" fill="#64748b">Work Email</text>
  <rect x="75" y="183" width="210" height="26" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2" rx="4"/>
  <text x="85" y="201" font-family="monospace" font-size="9" fill="#334155">sarah@oldcompany.com</text>

  <text x="75" y="226" font-family="sans-serif" font-size="10" fill="#64748b">Company</text>
  <rect x="75" y="231" width="210" height="26" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2" rx="4"/>
  <text x="85" y="249" font-family="monospace" font-size="9" fill="#334155">Acme Corp</text>

  <!-- Warning indicator on email -->
  <circle cx="270" cy="196" r="8" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="270" y="200" font-family="sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">!</text>

  <!-- Stale data label -->
  <rect x="100" y="270" width="170" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2" rx="5"/>
  <text x="185" y="290" font-family="sans-serif" font-size="10" fill="#92400e" text-anchor="middle" font-weight="600">Pre-filled = possibly stale</text>

  <!-- CTA button -->
  <rect x="100" y="315" width="160" height="34" fill="#0a66c2" rx="6"/>
  <text x="180" y="337" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Submit</text>

  <!-- Arrow -->
  <path d="M320 220 C370 220 380 220 420 220" fill="none" stroke="#6c4ff6" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="418,214 430,220 418,226" fill="#6c4ff6"/>

  <!-- Scrubby validation box (center) -->
  <rect x="440" y="130" width="150" height="180" fill="#fff" stroke="#6c4ff6" stroke-width="2.5" rx="10"/>
  <text x="515" y="162" font-family="sans-serif" font-size="13" fill="#6c4ff6" text-anchor="middle" font-weight="bold">Scrubby</text>
  <text x="515" y="178" font-family="sans-serif" font-size="10" fill="#6c4ff6" text-anchor="middle">Validation</text>

  <!-- Checkmark and X icons inside box -->
  <circle cx="490" cy="215" r="14" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <path d="M483 215 L488 220 L497 210" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  <text x="510" y="220" font-family="monospace" font-size="8" fill="#166534">Valid</text>

  <circle cx="490" cy="252" r="14" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="484" y1="246" x2="496" y2="258" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  <line x1="496" y1="246" x2="484" y2="258" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  <text x="510" y="257" font-family="monospace" font-size="8" fill="#991b1b">Stale</text>

  <circle cx="490" cy="289" r="14" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="490" y="293" font-family="sans-serif" font-size="12" fill="#a16207" text-anchor="middle" font-weight="bold">?</text>
  <text x="510" y="293" font-family="monospace" font-size="8" fill="#854d0e">Catch-all</text>

  <!-- Output arrows -->
  <path d="M595 190 C635 180 650 140 690 130" fill="none" stroke="#22c55e" stroke-width="2"/>
  <polygon points="688,124 700,130 688,136" fill="#22c55e"/>

  <path d="M595 270 C635 280 650 320 690 330" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 3"/>
  <polygon points="688,324 700,330 688,336" fill="#ef4444"/>

  <!-- CRM box -->
  <rect x="700" y="100" width="80" height="60" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8" rx="6"/>
  <text x="740" y="125" font-family="sans-serif" font-size="10" fill="#166534" text-anchor="middle" font-weight="bold">CRM</text>
  <text x="740" y="140" font-family="sans-serif" font-size="9" fill="#166534" text-anchor="middle">Import</text>
  <text x="740" y="155" font-family="sans-serif" font-size="16" fill="#22c55e" text-anchor="middle">&#x2713;</text>

  <!-- Discard box -->
  <rect x="700" y="305" width="80" height="60" fill="#fee2e2" stroke="#ef4444" stroke-width="1.8" rx="6"/>
  <text x="740" y="330" font-family="sans-serif" font-size="10" fill="#991b1b" text-anchor="middle" font-weight="bold">Discard</text>
  <text x="740" y="345" font-family="sans-serif" font-size="9" fill="#991b1b" text-anchor="middle">Invalid</text>
  <text x="740" y="360" font-family="sans-serif" font-size="16" fill="#ef4444" text-anchor="middle">&#x2717;</text>

  <!-- Bottom stat bar -->
  <rect x="50" y="405" width="700" height="32" fill="#6c4ff6" fill-opacity="0.08" rx="5"/>
  <text x="400" y="426" font-family="sans-serif" font-size="11" fill="#6c4ff6" text-anchor="middle" font-weight="600">Up to 30% of LinkedIn Lead Gen Form emails are outdated or invalid</text>
</svg>
