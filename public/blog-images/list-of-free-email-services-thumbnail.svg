  <rect x="185" y="190" width="80" height="55" rx="4" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <path d="M187 192 L225 222 L263 192" fill="none" stroke="#F87171" stroke-width="1.5" stroke-linecap="round"/>
  <text x="225" y="265" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="10" opacity="0.5">Zoho</text>
  <rect x="315" y="190" width="80" height="55" rx="4" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
