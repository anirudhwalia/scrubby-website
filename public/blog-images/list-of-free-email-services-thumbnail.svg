  <text x="355" y="265" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="10" opacity="0.5">GMX</text>
  <rect x="445" y="190" width="80" height="55" rx="4" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
