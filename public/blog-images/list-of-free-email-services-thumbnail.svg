  <!-- Decorative squiggly line -->
  <path d="M150 400 L180 395 L210 405 L240 395 L270 405 L300 395 L330 405 L360 395 L390 405 L420 395 L450 405 L480 395 L510 405 L540 395 L570 405 L600 395 L630 405" fill="none" stroke="#F87171" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
