<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Abstract grid pattern -->
  <g opacity="0.06" stroke="#94A3B8" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="490" x2="1200" y2="490"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
  </g>
  <!-- Shield icon -->
  <g transform="translate(820, 120)">
    <path d="M100 0 L200 50 L200 140 C200 210 150 260 100 280 C50 260 0 210 0 140 L0 50 Z" fill="url(#shield)" opacity="0.9"/>
    <path d="M80 140 L95 160 L130 110" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Email envelope icon -->
  <g transform="translate(870, 350)" opacity="0.7">
    <rect x="0" y="10" width="100" height="70" rx="8" stroke="url(#accent)" stroke-width="3" fill="none"/>
    <polyline points="0,10 50,50 100,10" stroke="url(#accent)" stroke-width="3" fill="none"/>
  </g>
  <!-- EU stars circle -->
  <g transform="translate(920, 200)" opacity="0.3">
    <circle cx="0" cy="-60" r="4" fill="#FCD34D"/>
    <circle cx="30" cy="-52" r="4" fill="#FCD34D"/>
    <circle cx="52" cy="-30" r="4" fill="#FCD34D"/>
    <circle cx="60" cy="0" r="4" fill="#FCD34D"/>
    <circle cx="52" cy="30" r="4" fill="#FCD34D"/>
    <circle cx="30" cy="52" r="4" fill="#FCD34D"/>
    <circle cx="0" cy="60" r="4" fill="#FCD34D"/>
    <circle cx="-30" cy="52" r="4" fill="#FCD34D"/>
    <circle cx="-52" cy="30" r="4" fill="#FCD34D"/>
    <circle cx="-60" cy="0" r="4" fill="#FCD34D"/>
    <circle cx="-52" cy="-30" r="4" fill="#FCD34D"/>
    <circle cx="-30" cy="-52" r="4" fill="#FCD34D"/>
  </g>
  <!-- Title text -->
  <text x="80" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#F8FAFC" letter-spacing="-1">GDPR-Compliant</text>
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#F8FAFC" letter-spacing="-1">Email Validation</text>
  <text x="80" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94A3B8" letter-spacing="0.5">The Complete Guide for SaaS &amp; FinTech</text>
  <!-- Accent bar -->
  <rect x="80" y="380" width="120" height="4" rx="2" fill="url(#accent)"/>
  <!-- Scrubby branding -->
  <text x="80" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="url(#shield)">scrubby.io</text>
  <text x="80" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748B">Email Validation &amp; Compliance</text>
</svg>
