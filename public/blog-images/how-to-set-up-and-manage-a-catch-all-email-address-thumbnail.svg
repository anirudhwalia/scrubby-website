  <!-- Small envelopes falling into funnel -->
  <rect x="300" y="40" width="30" height="20" rx="2" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <path d="M301 41 L315 53 L329 41" fill="none" stroke="#F87171" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="370" y="30" width="30" height="20" rx="2" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <path d="M371 31 L385 43 L399 31" fill="none" stroke="#F87171" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="440" y="45" width="30" height="20" rx="2" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <path d="M441 46 L455 58 L469 46" fill="none" stroke="#F87171" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="340" y="55" width="25" height="18" rx="2" fill="none" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <rect x="410" y="50" width="25" height="18" rx="2" fill="none" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Gear icon on side -->
  <circle cx="130" cy="200" r="35" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="130" cy="200" r="15" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
  <line x1="130" y1="160" x2="130" y2="172" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="228" x2="130" y2="240" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="200" x2="102" y2="200" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <line x1="158" y1="200" x2="170" y2="200" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <!-- Wrench icon on side -->
  <path d="M650 160 L680 190 L670 200 L640 170 Z" fill="none" stroke="#F87171" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
