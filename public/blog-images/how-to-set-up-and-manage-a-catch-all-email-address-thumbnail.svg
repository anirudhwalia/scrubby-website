  <!-- Output arrow from funnel -->
  <line x1="400" y1="340" x2="400" y2="400" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,4"/>
  <path d="M385 390 L400 410 L415 390" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
  <text x="400" y="438" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="14" opacity="0.6">Set Up Catch-All Email</text>
</svg>