<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Magnifying glass (search/find) -->
  <circle cx="320" cy="190" r="70" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <circle cx="320" cy="190" r="68" fill="none" stroke="#2DD4BF" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="240" x2="420" y2="290" stroke="#2DD4BF" stroke-width="4" stroke-linecap="round"/>
  <!-- Email icon inside magnifying glass -->
  <rect x="290" y="175" width="60" height="35" rx="3" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <path d="M291 176 L320 197 L349 176" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <!-- Comparison arrows/alternatives branching -->
  <line x1="430" y1="140" x2="550" y2="100" stroke="#2DD4BF" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round" opacity="0.7"/>
  <line x1="430" y1="190" x2="550" y2="190" stroke="#2DD4BF" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round" opacity="0.7"/>
  <line x1="430" y1="240" x2="550" y2="280" stroke="#2DD4BF" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round" opacity="0.7"/>
  <!-- Tool boxes -->
  <rect x="555" y="80" width="100" height="40" rx="5" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <rect x="555" y="170" width="100" height="40" rx="5" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="555" y="260" width="100" height="40" rx="5" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <!-- Star on the middle (best) box -->
  <path d="M605 182 L608 190 L617 190 L610 196 L613 205 L605 200 L597 205 L600 196 L593 190 L602 190 Z" fill="#2DD4BF" opacity="0.6"/>
  <!-- Sketchy lines -->
  <line x1="100" y1="370" x2="700" y2="370" stroke="#2DD4BF" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <text x="400" y="410" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="14" opacity="0.6">Hunter.io Alternatives</text>
</svg>