<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Eye -->
  <path d="M280 220 Q400 140 520 220 Q400 300 280 220" stroke="#2DD4BF" stroke-width="3" fill="none"/>
  <circle cx="400" cy="220" r="35" stroke="#F87171" stroke-width="2.5" fill="none"/>
  <circle cx="400" cy="220" r="15" stroke="#F87171" stroke-width="2" fill="none"/>
  <circle cx="405" cy="215" r="5" fill="#F87171" opacity="0.6"/>
  <!-- Envelope with tracking pixel -->
  <rect x="350" y="100" width="50" height="35" rx="3" stroke="#2DD4BF" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M350 100 L375 120 L400 100" stroke="#2DD4BF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <rect x="388" y="125" width="6" height="6" fill="#F87171" opacity="0.8"/>
  <!-- Signal waves from pixel -->
  <path d="M395 120 Q410 110 405 95" stroke="#F87171" stroke-width="1.5" fill="none" stroke-dasharray="3 2" opacity="0.5"/>
  <path d="M400 115 Q420 100 410 85" stroke="#F87171" stroke-width="1.5" fill="none" stroke-dasharray="3 2" opacity="0.4"/>
  <!-- Data lines / analytics -->
  <path d="M200 330 L280 310 L360 340 L440 300 L520 320 L600 290" stroke="#2DD4BF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="280" cy="310" r="3" fill="#2DD4BF"/>
  <circle cx="360" cy="340" r="3" fill="#F87171"/>
  <circle cx="440" cy="300" r="3" fill="#2DD4BF"/>
  <circle cx="520" cy="320" r="3" fill="#F87171"/>
  <circle cx="600" cy="290" r="3" fill="#2DD4BF"/>
  <!-- Magnifying glass -->
  <circle cx="610" cy="170" r="25" stroke="#2DD4BF" stroke-width="2" fill="none" opacity="0.5"/>
  <line x1="628" y1="188" x2="650" y2="210" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Label -->
  <text x="400" y="400" font-family="monospace" font-size="13" fill="#2DD4BF" text-anchor="middle" opacity="0.7">EMAIL TRACKING</text>
</svg>