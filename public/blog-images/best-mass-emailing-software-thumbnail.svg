<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Multiple emails flying out -->
  <rect x="180" y="140" width="60" height="42" rx="3" fill="none" stroke="#2DD4BF" stroke-width="2" transform="rotate(-20 210 161)"/>
  <path d="M180 140 L210 165 L240 140" fill="none" stroke="#2DD4BF" stroke-width="1.5" transform="rotate(-20 210 161)"/>
  <rect x="260" y="120" width="60" height="42" rx="3" fill="none" stroke="#F87171" stroke-width="2" transform="rotate(-10 290 141)"/>
  <path d="M260 120 L290 145 L320 120" fill="none" stroke="#F87171" stroke-width="1.5" transform="rotate(-10 290 141)"/>
  <rect x="340" y="110" width="60" height="42" rx="3" fill="none" stroke="#2DD4BF" stroke-width="2" transform="rotate(-5 370 131)"/>
  <path d="M340 110 L370 135 L400 110" fill="none" stroke="#2DD4BF" stroke-width="1.5" transform="rotate(-5 370 131)"/>
  <rect x="420" y="115" width="60" height="42" rx="3" fill="none" stroke="#F87171" stroke-width="2" transform="rotate(5 450 136)"/>
  <rect x="500" y="125" width="60" height="42" rx="3" fill="none" stroke="#2DD4BF" stroke-width="2" transform="rotate(12 530 146)" opacity="0.6"/>
  <rect x="570" y="140" width="60" height="42" rx="3" fill="none" stroke="#F87171" stroke-width="1.5" transform="rotate(18 600 161)" opacity="0.4"/>
  <!-- Computer/screen -->
  <rect x="300" y="190" width="200" height="120" rx="6" fill="none" stroke="#2DD4BF" stroke-width="3"/>
  <line x1="370" y1="310" x2="430" y2="310" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="310" x2="400" y2="325" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
  <line x1="360" y1="325" x2="440" y2="325" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
  <!-- Send button on screen -->
  <rect x="360" y="240" width="80" height="30" rx="4" fill="none" stroke="#F87171" stroke-width="2"/>
  <text x="400" y="260" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="12">SEND</text>
  <!-- Speed lines -->
  <line x1="510" y1="200" x2="560" y2="185" stroke="#2DD4BF" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <line x1="510" y1="220" x2="570" y2="210" stroke="#F87171" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <line x1="510" y1="240" x2="555" y2="235" stroke="#2DD4BF" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <!-- Sparkles -->
  <path d="M150" y1="250" d="M150 250 L155 240 L160 250 L155 260Z" fill="#F87171" opacity="0.4"/>
  <circle cx="680" cy="260" r="4" fill="#2DD4BF" opacity="0.4"/>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="22" font-weight="bold" opacity="0.9">Best Mass Emailing Software</text>
  <text x="400" y="410" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="14" opacity="0.7">for 2024</text>
</svg>