<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f8f5f0" rx="8"/>

  <!-- email list / spreadsheet -->
  <rect x="80" y="110" width="200" height="230" rx="6" fill="none" stroke="#2d6a4f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- header row -->
  <line x1="80" y1="145" x2="280" y2="145" stroke="#2d6a4f" stroke-width="2" stroke-linecap="round"/>
  <text x="180" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2d6a4f">email list</text>
  <!-- rows with email lines -->
  <rect x="95" y="158" width="130" height="6" rx="3" fill="#2d6a4f" opacity="0.3"/>
  <rect x="95" y="176" width="110" height="6" rx="3" fill="#2d6a4f" opacity="0.3"/>
  <rect x="95" y="194" width="145" height="6" rx="3" fill="#e63946" opacity="0.35"/>
  <rect x="95" y="212" width="120" height="6" rx="3" fill="#2d6a4f" opacity="0.3"/>
  <rect x="95" y="230" width="135" height="6" rx="3" fill="#e63946" opacity="0.35"/>
  <rect x="95" y="248" width="100" height="6" rx="3" fill="#2d6a4f" opacity="0.3"/>
  <rect x="95" y="266" width="140" height="6" rx="3" fill="#2d6a4f" opacity="0.3"/>
  <rect x="95" y="284" width="115" height="6" rx="3" fill="#e63946" opacity="0.35"/>
  <!-- check/x marks on rows -->
  <path d="M245 157 L250 163 L260 152" fill="none" stroke="#52b788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M245 175 L250 181 L260 170" fill="none" stroke="#52b788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M247 191 L257 201 M257 191 L247 201" stroke="#e63946" stroke-width="2" stroke-linecap="round"/>
  <path d="M245 211 L250 217 L260 206" fill="none" stroke="#52b788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M247 227 L257 237 M257 227 L247 237" stroke="#e63946" stroke-width="2" stroke-linecap="round"/>
  <path d="M245 247 L250 253 L260 242" fill="none" stroke="#52b788" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arrow from list to validation shield -->
  <path d="M285 225 L340 225" fill="none" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,4"/>
  <path d="M333 218 L342 225 L333 232" fill="none" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- validation shield -->
  <path d="M390 140 L350 165 L350 240 Q350 280 390 300 Q430 280 430 240 L430 165 Z" fill="none" stroke="#52b788" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M370 220 L385 236 L415 200" fill="none" stroke="#52b788" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="390" y="172" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#52b788">verify</text>

  <!-- arrow from shield to outreach tools -->
  <path d="M435 225 L490 225" fill="none" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,4"/>
  <path d="M483 218 L492 225 L483 232" fill="none" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- outreach tool window (Instantly/Smartlead) -->
  <rect x="500" y="120" width="220" height="210" rx="8" fill="none" stroke="#2d6a4f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- title bar -->
  <line x1="500" y1="152" x2="720" y2="152" stroke="#2d6a4f" stroke-width="2" stroke-linecap="round"/>
  <circle cx="518" cy="136" r="5" fill="#e63946" opacity="0.7"/>
  <circle cx="536" cy="136" r="5" fill="#e76f51" opacity="0.7"/>
  <circle cx="554" cy="136" r="5" fill="#52b788" opacity="0.7"/>
  <text x="630" y="141" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2d6a4f">cold outreach</text>
  <!-- sequence bars -->
  <rect x="520" y="168" width="180" height="14" rx="4" fill="#52b788" opacity="0.2"/>
  <rect x="520" y="168" width="140" height="14" rx="4" fill="#52b788" opacity="0.4"/>
  <text x="530" y="179" font-family="Georgia, serif" font-size="9" fill="#2d6a4f">sequence 1 - active</text>
  <rect x="520" y="192" width="180" height="14" rx="4" fill="#52b788" opacity="0.2"/>
  <rect x="520" y="192" width="100" height="14" rx="4" fill="#52b788" opacity="0.4"/>
  <text x="530" y="203" font-family="Georgia, serif" font-size="9" fill="#2d6a4f">sequence 2 - warm</text>
  <!-- email icons in sequence -->
  <rect x="525" y="220" width="38" height="28" rx="4" fill="none" stroke="#52b788" stroke-width="1.8"/>
  <path d="M527 222 L544 238 L561 222" fill="none" stroke="#52b788" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="575" y="220" width="38" height="28" rx="4" fill="none" stroke="#52b788" stroke-width="1.8"/>
  <path d="M577 222 L594 238 L611 222" fill="none" stroke="#52b788" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="625" y="220" width="38" height="28" rx="4" fill="none" stroke="#52b788" stroke-width="1.8"/>
  <path d="M627 222 L644 238 L661 222" fill="none" stroke="#52b788" stroke-width="1.8" stroke-linecap="round"/>
  <!-- bounce rate indicator -->
  <rect x="520" y="262" width="180" height="22" rx="4" fill="#52b788" opacity="0.1" stroke="#52b788" stroke-width="1.5"/>
  <text x="610" y="277" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2d6a4f">bounce rate: 0.8%</text>

  <!-- warning icon top-right (burned domain) -->
  <path d="M680 80 L695 110 L665 110 Z" fill="none" stroke="#e63946" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="680" y1="92" x2="680" y2="100" stroke="#e63946" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="680" cy="105" r="1.5" fill="#e63946"/>
  <text x="680" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#e63946">domain burned?</text>

  <!-- decorative dots -->
  <circle cx="130" cy="370" r="4" fill="#52b788" opacity="0.25"/>
  <circle cx="300" cy="360" r="3" fill="#e76f51" opacity="0.2"/>
  <circle cx="680" cy="350" r="5" fill="#2d6a4f" opacity="0.2"/>
  <circle cx="100" cy="85" r="4" fill="#e63946" opacity="0.2"/>

  <!-- bottom text -->
  <text x="400" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#333" font-style="italic">Validate Before You Send</text>
  <text x="400" y="405" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#777">clean lists · protect domains · cold outreach that lands</text>
</svg>