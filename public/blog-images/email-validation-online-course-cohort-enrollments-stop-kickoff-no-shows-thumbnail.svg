  <line x1="360" y1="358" x2="440" y2="358" stroke="#1e3a8a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Camera grid (cohort kickoff vibe) -->
  <g transform="translate(215, 115)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="80" height="55" rx="4" fill="#22c55e" opacity="0.18" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="40" cy="22" r="9" fill="none" stroke="#1e3a8a" stroke-width="1.8"/>
    <path d="M28 42 Q40 30 52 42" fill="none" stroke="#1e3a8a" stroke-width="1.8" stroke-linecap="round"/>
