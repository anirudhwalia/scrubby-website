  <!-- LIVE indicator -->
  <circle cx="220" cy="105" r="6" fill="#ef4444"/>
  <text x="232" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444" font-weight="700" letter-spacing="1">KICKOFF</text>

  <!-- Floating envelope (delivered) -->
  <g transform="translate(670, 110) rotate(8)">
    <rect x="0" y="0" width="56" height="38" rx="3" fill="#ffffff" stroke="#1e3a8a" stroke-width="2.2"/>
