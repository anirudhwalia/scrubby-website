    <rect x="95" y="0" width="80" height="55" rx="4" fill="#ef4444" opacity="0.12" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="135" y="33" font-family="system-ui, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle" font-weight="700">?</text>
    <path d="M154 4 L168 18 M168 4 L154 18" stroke="#ef4444" stroke-width="2.6" stroke-linecap="round"/>

    <rect x="190" y="0" width="80" height="55" rx="4" fill="#22c55e" opacity="0.18" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="230" cy="22" r="9" fill="none" stroke="#1e3a8a" stroke-width="1.8"/>
    <path d="M218 42 Q230 30 242 42" fill="none" stroke="#1e3a8a" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M252 4 L256 8 L264 -2" fill="none" stroke="#22c55e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="285" y="0" width="80" height="55" rx="4" fill="#22c55e" opacity="0.18" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="325" cy="22" r="9" fill="none" stroke="#1e3a8a" stroke-width="1.8"/>
    <path d="M313 42 Q325 30 337 42" fill="none" stroke="#1e3a8a" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Row 2 -->
    <rect x="0" y="70" width="80" height="55" rx="4" fill="#ef4444" opacity="0.12" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="40" y="103" font-family="system-ui, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle" font-weight="700">?</text>
    <path d="M59 74 L73 88 M73 74 L59 88" stroke="#ef4444" stroke-width="2.6" stroke-linecap="round"/>

    <rect x="95" y="70" width="80" height="55" rx="4" fill="#22c55e" opacity="0.18" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="135" cy="92" r="9" fill="none" stroke="#1e3a8a" stroke-width="1.8"/>
    <path d="M123 112 Q135 100 147 112" fill="none" stroke="#1e3a8a" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M157 74 L161 78 L169 68" fill="none" stroke="#22c55e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="190" y="70" width="80" height="55" rx="4" fill="#22c55e" opacity="0.18" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="230" cy="92" r="9" fill="none" stroke="#1e3a8a" stroke-width="1.8"/>
    <path d="M218 112 Q230 100 242 112" fill="none" stroke="#1e3a8a" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M252 74 L256 78 L264 68" fill="none" stroke="#22c55e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

