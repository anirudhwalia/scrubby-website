  <!-- Floating envelope (bounced) -->
  <g transform="translate(60, 240) rotate(-12)">
    <rect x="0" y="0" width="56" height="38" rx="3" fill="#ffffff" stroke="#1e3a8a" stroke-width="2.2"/>
    <path d="M2 3 L28 22 L54 3" fill="none" stroke="#1e3a8a" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M42 8 L54 20 M54 8 L42 20" stroke="#ef4444" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="400" y="415" font-family="system-ui, sans-serif" font-size="18" fill="#1e3a8a" text-anchor="middle" font-weight="700" letter-spacing="0.3">Clean Enrollments Before Kickoff</text>
