    <text x="325" y="103" font-family="system-ui, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle" font-weight="700">?</text>
    <path d="M344 74 L358 88 M358 74 L344 88" stroke="#ef4444" stroke-width="2.6" stroke-linecap="round"/>
