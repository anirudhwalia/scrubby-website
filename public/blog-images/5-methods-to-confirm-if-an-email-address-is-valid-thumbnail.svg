<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Magnifying glass -->
  <circle cx="350" cy="180" r="70" fill="none" stroke="#2DD4BF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="400" y1="230" x2="460" y2="290" stroke="#2DD4BF" stroke-width="4" stroke-linecap="round"/>
  <!-- @ symbol inside magnifying glass -->
  <text x="350" y="195" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="50" font-weight="bold" opacity="0.7">@</text>
  <!-- Checkmark badge -->
  <circle cx="560" cy="140" r="30" fill="none" stroke="#2DD4BF" stroke-width="2.5"/>
  <polyline points="545,140 555,152 578,128" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- X badge -->
  <circle cx="560" cy="220" r="25" fill="none" stroke="#F87171" stroke-width="2.5"/>
  <line x1="548" y1="208" x2="572" y2="232" stroke="#F87171" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="572" y1="208" x2="548" y2="232" stroke="#F87171" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 5 numbered dots -->
  <circle cx="640" cy="120" r="12" fill="none" stroke="#F87171" stroke-width="2"/>
  <text x="640" y="125" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="12">1</text>
  <circle cx="670" cy="160" r="12" fill="none" stroke="#2DD4BF" stroke-width="2"/>
  <text x="670" y="165" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="12">2</text>
  <circle cx="660" cy="205" r="12" fill="none" stroke="#F87171" stroke-width="2"/>
  <text x="660" y="210" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="12">3</text>
  <circle cx="680" cy="248" r="12" fill="none" stroke="#2DD4BF" stroke-width="2"/>
  <text x="680" y="253" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="12">4</text>
  <circle cx="650" cy="290" r="12" fill="none" stroke="#F87171" stroke-width="2"/>
  <text x="650" y="295" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="12">5</text>
  <!-- Sparkles -->
  <path d="M180 300 L185 290 L190 300 L185 310Z" fill="#2DD4BF" opacity="0.4"/>
  <circle cx="250" cy="320" r="3" fill="#F87171" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="22" font-weight="bold" opacity="0.9">5 Methods to Validate Emails</text>
  <text x="400" y="410" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="14" opacity="0.7">Confirm if an Address is Valid</text>
</svg>