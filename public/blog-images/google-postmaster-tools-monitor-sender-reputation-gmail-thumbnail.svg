<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="A hand-drawn dashboard showing a sender reputation gauge">
  <rect x="0" y="0" width="800" height="450" fill="#f4f8fb"/>
  <!-- dashboard panel -->
  <rect x="70" y="60" width="660" height="330" rx="18" fill="#ffffff" stroke="#1f3a5f" stroke-width="3" transform="rotate(-0.5 400 225)"/>
  <line x1="70" y1="110" x2="730" y2="110" stroke="#1f3a5f" stroke-width="2.5" stroke-dasharray="2 0"/>
  <circle cx="95" cy="85" r="6" fill="#ff6b6b"/>
  <circle cx="118" cy="85" r="6" fill="#ffd166"/>
  <circle cx="141" cy="85" r="6" fill="#2bb673"/>
  <text x="640" y="92" font-family="Comic Sans MS, Segoe Print, cursive" font-size="20" fill="#1f3a5f">Gmail</text>

  <!-- reputation gauge (semi-circle) -->
  <path d="M 150 300 A 110 110 0 0 1 370 300" fill="none" stroke="#e0e6ed" stroke-width="20" stroke-linecap="round"/>
  <path d="M 150 300 A 110 110 0 0 1 320 220" fill="none" stroke="#2bb673" stroke-width="20" stroke-linecap="round"/>
  <!-- needle -->
  <line x1="260" y1="300" x2="332" y2="232" stroke="#1f3a5f" stroke-width="5" stroke-linecap="round"/>
  <circle cx="260" cy="300" r="9" fill="#1f3a5f"/>
  <text x="200" y="345" font-family="Comic Sans MS, Segoe Print, cursive" font-size="22" fill="#1f3a5f">Reputation: High</text>

  <!-- bar chart on right -->
  <line x1="470" y1="320" x2="470" y2="150" stroke="#1f3a5f" stroke-width="2.5"/>
  <line x1="470" y1="320" x2="700" y2="320" stroke="#1f3a5f" stroke-width="2.5"/>
  <rect x="500" y="250" width="34" height="70" fill="#9ad0c2" stroke="#1f3a5f" stroke-width="2"/>
  <rect x="555" y="210" width="34" height="110" fill="#5cb8a0" stroke="#1f3a5f" stroke-width="2"/>
  <rect x="610" y="175" width="34" height="145" fill="#2bb673" stroke="#1f3a5f" stroke-width="2"/>
  <rect x="665" y="230" width="34" height="90" fill="#5cb8a0" stroke="#1f3a5f" stroke-width="2"/>
  <!-- squiggly trend line over bars -->
  <path d="M 517 245 Q 545 200 572 205 T 627 170 T 682 225" fill="none" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>

  <text x="470" y="365" font-family="Comic Sans MS, Segoe Print, cursive" font-size="18" fill="#5a6b7b">Spam rate trend</text>
</svg>
