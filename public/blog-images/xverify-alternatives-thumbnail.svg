<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- VS comparison layout -->
  <!-- Left side - XVerify (crossed out) -->
  <g transform="translate(150, 80)">
    <rect width="180" height="200" rx="8" stroke="#F87171" stroke-width="2" fill="none" opacity="0.6" transform="rotate(-1 90 100)"/>
    <text x="90" y="110" font-family="Arial" font-size="20" fill="#F87171" text-anchor="middle" opacity="0.6">XVerify</text>
    <!-- Cross out -->
    <line x1="20" y1="30" x2="160" y2="180" stroke="#F87171" stroke-width="3" opacity="0.4"/>
    <line x1="160" y1="30" x2="20" y2="180" stroke="#F87171" stroke-width="3" opacity="0.4"/>
  </g>
  <!-- VS circle -->
  <circle cx="400" cy="180" r="28" stroke="#2DD4BF" stroke-width="2" fill="#1a1a2e"/>
  <text x="400" y="186" font-family="Arial" font-size="16" fill="#2DD4BF" text-anchor="middle" font-weight="bold">VS</text>
  <!-- Right side - Alternatives (highlighted) -->
  <g transform="translate(470, 80)">
    <rect width="180" height="200" rx="8" stroke="#2DD4BF" stroke-width="2.5" fill="none" transform="rotate(1 90 100)"/>
    <!-- Stacked cards effect -->
    <rect x="8" y="30" width="164" height="30" rx="4" stroke="#2DD4BF" stroke-width="1.5" fill="none" opacity="0.7"/>
    <rect x="8" y="70" width="164" height="30" rx="4" stroke="#2DD4BF" stroke-width="1.5" fill="none" opacity="0.7"/>
    <rect x="8" y="110" width="164" height="30" rx="4" stroke="#F87171" stroke-width="2" fill="#F87171" fill-opacity="0.1"/>
    <rect x="8" y="150" width="164" height="30" rx="4" stroke="#2DD4BF" stroke-width="1.5" fill="none" opacity="0.7"/>
    <!-- Labels -->
    <text x="90" y="50" font-family="Arial" font-size="11" fill="#2DD4BF" text-anchor="middle" opacity="0.7">Scrubby</text>
    <text x="90" y="90" font-family="Arial" font-size="11" fill="#2DD4BF" text-anchor="middle" opacity="0.7">Kickbox</text>
    <text x="90" y="130" font-family="Arial" font-size="11" fill="#F87171" text-anchor="middle" font-weight="bold">Top Pick</text>
    <text x="90" y="170" font-family="Arial" font-size="11" fill="#2DD4BF" text-anchor="middle" opacity="0.7">ListClean</text>
  </g>
  <!-- Star ratings -->
  <g fill="#F87171" opacity="0.5">
    <path d="M490 115 l4-8 4 8 8-3-6 6 2 9-8-5-8 5 2-9-6-6z"/>
    <path d="M515 115 l4-8 4 8 8-3-6 6 2 9-8-5-8 5 2-9-6-6z"/>
    <path d="M540 115 l4-8 4 8 8-3-6 6 2 9-8-5-8 5 2-9-6-6z"/>
    <path d="M565 115 l4-8 4 8 8-3-6 6 2 9-8-5-8 5 2-9-6-6z"/>
    <path d="M590 115 l4-8 4 8 8-3-6 6 2 9-8-5-8 5 2-9-6-6z"/>
  </g>
  <!-- Arrows -->
  <g stroke="#2DD4BF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5">
    <path d="M340 180 L365 180"/>
    <path d="M435 180 L460 180"/>
  </g>
  <text x="400" y="350" font-family="Arial" font-size="20" fill="#2DD4BF" text-anchor="middle" font-weight="bold">XVerify Alternatives</text>
  <text x="400" y="380" font-family="Arial" font-size="14" fill="#F87171" text-anchor="middle" opacity="0.7">Email Validation Tools Compared</text>
</svg>