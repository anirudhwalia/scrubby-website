<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Mail icon cluster -->
  <rect x="250" y="100" width="80" height="55" rx="5" fill="none" stroke="#2DD4BF" stroke-width="2.5"/>
  <path d="M250 100 L290 132 L330 100" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
  <rect x="360" y="90" width="80" height="55" rx="5" fill="none" stroke="#F87171" stroke-width="2.5"/>
  <path d="M360 90 L400 122 L440 90" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <rect x="470" y="100" width="80" height="55" rx="5" fill="none" stroke="#2DD4BF" stroke-width="2.5"/>
  <path d="M470 100 L510 132 L550 100" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
  <!-- FREE tag -->
  <rect x="320" y="180" width="160" height="40" rx="6" fill="none" stroke="#F87171" stroke-width="2.5" stroke-dasharray="5 3"/>
  <text x="400" y="206" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="18" font-weight="bold">FREE</text>
  <!-- 7 provider dots in a row -->
  <circle cx="220" cy="270" r="14" fill="none" stroke="#2DD4BF" stroke-width="2"/>
  <circle cx="300" cy="270" r="14" fill="none" stroke="#F87171" stroke-width="2"/>
  <circle cx="380" cy="270" r="14" fill="none" stroke="#2DD4BF" stroke-width="2"/>
  <circle cx="460" cy="270" r="14" fill="none" stroke="#F87171" stroke-width="2"/>
  <circle cx="540" cy="270" r="14" fill="none" stroke="#2DD4BF" stroke-width="2"/>
  <circle cx="620" cy="270" r="14" fill="none" stroke="#F87171" stroke-width="2"/>
  <circle cx="700" cy="270" r="14" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-dasharray="3 2"/>
  <!-- Sparkles -->
  <path d="M150 150 L155 140 L160 150 L155 160Z" fill="#2DD4BF" opacity="0.4"/>
  <path d="M650 130 L655 120 L660 130 L655 140Z" fill="#F87171" opacity="0.4"/>
  <circle cx="130" cy="270" r="3" fill="#F87171" opacity="0.3"/>
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="22" font-weight="bold" opacity="0.9">7 Best Free Email Providers</text>
  <text x="400" y="400" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="14" opacity="0.7">in 2024</text>
</svg>