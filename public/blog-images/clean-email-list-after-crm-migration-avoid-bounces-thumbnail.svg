<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f8f6f1" rx="8"/>
  <!-- Old CRM box (left) -->
  <g transform="translate(120, 100)">
    <rect x="0" y="0" width="140" height="100" rx="6" fill="none" stroke="#888" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="70" y="35" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#888">OLD CRM</text>
    <!-- Messy data lines -->
    <line x1="20" y1="55" x2="120" y2="55" stroke="#d94f4f" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="20" y1="70" x2="100" y2="70" stroke="#d94f4f" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="20" y1="85" x2="110" y2="85" stroke="#d94f4f" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Arrow with cleaning brush -->
  <g transform="translate(300, 130)">
    <path d="M0 20 Q60 -15, 120 20 Q180 55, 200 20" fill="none" stroke="#5a8f7b" stroke-width="3" stroke-linecap="round"/>
    <polygon points="195,12 210,20 195,28" fill="#5a8f7b"/>
    <!-- Sparkles (cleaning) -->
    <path d="M80 0 L83 8 L91 5 L85 11 L92 16 L83 14 L80 22 L77 14 L68 16 L75 11 L69 5 L77 8 Z" fill="#e8a838" opacity="0.7"/>
    <path d="M140 35 L142 40 L147 38 L144 42 L148 45 L142 44 L140 49 L138 44 L132 45 L136 42 L133 38 L138 40 Z" fill="#e8a838" opacity="0.5"/>
  </g>
  <!-- New CRM box (right) -->
  <g transform="translate(540, 100)">
    <rect x="0" y="0" width="140" height="100" rx="6" fill="none" stroke="#5a8f7b" stroke-width="2.5"/>
    <text x="70" y="35" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5a8f7b" font-weight="bold">NEW CRM</text>
    <!-- Clean data lines with checkmarks -->
    <line x1="20" y1="55" x2="95" y2="55" stroke="#5a8f7b" stroke-width="2" stroke-linecap="round"/>
    <path d="M102 52 L108 58 L118 48" fill="none" stroke="#5a8f7b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="95" y2="70" stroke="#5a8f7b" stroke-width="2" stroke-linecap="round"/>
    <path d="M102 67 L108 73 L118 63" fill="none" stroke="#5a8f7b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="85" x2="95" y2="85" stroke="#5a8f7b" stroke-width="2" stroke-linecap="round"/>
    <path d="M102 82 L108 88 L118 78" fill="none" stroke="#5a8f7b" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Bouncing envelopes (bad) below left -->
  <g transform="translate(140, 260)">
    <rect x="0" y="0" width="45" height="30" rx="3" fill="none" stroke="#d94f4f" stroke-width="2"/>
    <path d="M2 2 L22.5 16 L43 2" fill="none" stroke="#d94f4f" stroke-width="1.5"/>
    <line x1="15" y1="10" x2="30" y2="22" stroke="#d94f4f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="10" x2="15" y2="22" stroke="#d94f4f" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(210, 275) rotate(10)">
    <rect x="0" y="0" width="40" height="28" rx="3" fill="none" stroke="#d94f4f" stroke-width="2"/>
    <path d="M2 2 L20 14 L38 2" fill="none" stroke="#d94f4f" stroke-width="1.5"/>
    <line x1="13" y1="9" x2="27" y2="20" stroke="#d94f4f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="27" y1="9" x2="13" y2="20" stroke="#d94f4f" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Clean envelopes (good) below right -->
  <g transform="translate(560, 260)">
    <rect x="0" y="0" width="45" height="30" rx="3" fill="none" stroke="#5a8f7b" stroke-width="2"/>
    <path d="M2 2 L22.5 16 L43 2" fill="none" stroke="#5a8f7b" stroke-width="1.5"/>
  </g>
  <g transform="translate(625, 270) rotate(-5)">
    <rect x="0" y="0" width="40" height="28" rx="3" fill="none" stroke="#5a8f7b" stroke-width="2"/>
    <path d="M2 2 L20 14 L38 2" fill="none" stroke="#5a8f7b" stroke-width="1.5"/>
  </g>
  <!-- Bounce arrow from bad emails -->
  <path d="M170 295 Q170 340, 200 340 Q230 340, 220 310" fill="none" stroke="#d94f4f" stroke-width="2" stroke-dasharray="4 3" stroke-linecap="round"/>
  <text x="185" y="365" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d94f4f">bounced</text>
  <!-- Title -->
  <text x="400" y="425" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#444" font-weight="bold">CRM migration + list cleaning</text>
</svg>