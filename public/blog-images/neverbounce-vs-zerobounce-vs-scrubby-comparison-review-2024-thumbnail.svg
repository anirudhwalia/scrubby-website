<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Three circles in a Venn-like arrangement -->
  <circle cx="300" cy="200" r="90" fill="none" stroke="#F87171" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="500" cy="200" r="90" fill="none" stroke="#F87171" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="400" cy="320" r="90" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
  <!-- Labels -->
  <text x="250" y="180" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="12" opacity="0.7">Never</text>
  <text x="250" y="195" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="12" opacity="0.7">Bounce</text>
  <text x="550" y="180" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="12" opacity="0.7">Zero</text>
  <text x="550" y="195" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="12" opacity="0.7">Bounce</text>
  <text x="400" y="365" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.9">Scrubby</text>
  <!-- VS text -->
  <text x="400" y="175" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="18" font-weight="bold" opacity="0.5">VS</text>
  <!-- Checkmark in Scrubby circle -->
  <path d="M385 330 L395 342 L418 315" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 2024 label -->
  <text x="400" y="80" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="20" opacity="0.4">2024</text>
  <text x="400" y="435" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="14" opacity="0.6">Three-Way Comparison</text>
