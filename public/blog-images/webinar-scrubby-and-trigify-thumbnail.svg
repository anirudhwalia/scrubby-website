<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Video player outline -->
  <rect x="150" y="60" width="500" height="280" rx="10" stroke="#2DD4BF" stroke-width="2.5" fill="none" transform="rotate(-0.5 400 200)"/>
  <!-- Play button -->
  <circle cx="400" cy="200" r="50" stroke="#F87171" stroke-width="3" fill="none"/>
  <path d="M380 175 L430 200 L380 225 Z" fill="#F87171" fill-opacity="0.5" stroke="#F87171" stroke-width="2"/>
  <!-- Screen scanlines -->
  <g stroke="#2DD4BF" stroke-width="0.5" opacity="0.15">
    <line x1="160" y1="100" x2="640" y2="100"/>
    <line x1="160" y1="140" x2="640" y2="140"/>
    <line x1="160" y1="180" x2="640" y2="180"/>
    <line x1="160" y1="220" x2="640" y2="220"/>
    <line x1="160" y1="260" x2="640" y2="260"/>
    <line x1="160" y1="300" x2="640" y2="300"/>
  </g>
  <!-- Webcam dots -->
  <circle cx="400" cy="75" r="4" fill="#F87171" opacity="0.8"/>
  <!-- Two speaker silhouettes at bottom -->
  <g transform="translate(250, 360)" stroke="#2DD4BF" stroke-width="2" fill="none">
    <circle cx="20" cy="0" r="12"/>
    <path d="M0 30 Q20 20 40 30"/>
  </g>
  <g transform="translate(490, 360)" stroke="#F87171" stroke-width="2" fill="none">
    <circle cx="20" cy="0" r="12"/>
    <path d="M0 30 Q20 20 40 30"/>
  </g>
  <!-- Labels -->
  <text x="270" y="415" font-family="Arial" font-size="12" fill="#2DD4BF" text-anchor="middle">Scrubby</text>
  <text x="510" y="415" font-family="Arial" font-size="12" fill="#F87171" text-anchor="middle">Trigify</text>
  <!-- Wi-fi/signal waves -->
  <g transform="translate(680, 80)" stroke="#2DD4BF" stroke-width="2" fill="none" opacity="0.5">
    <path d="M0 30 Q10 20 20 30"/>
    <path d="M-5 25 Q10 10 25 25"/>
    <path d="M-10 20 Q10 0 30 20"/>
  </g>
  <text x="400" y="435" font-family="Arial" font-size="14" fill="#2DD4BF" text-anchor="middle" opacity="0.7">LIVE WEBINAR</text>
</svg>