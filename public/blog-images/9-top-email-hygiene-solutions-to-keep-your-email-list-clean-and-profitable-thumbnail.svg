<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Soap bubbles / cleaning motif -->
  <circle cx="200" cy="150" r="40" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.5"/>
  <circle cx="260" cy="110" r="25" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="170" cy="100" r="15" fill="none" stroke="#F87171" stroke-width="1.5" opacity="0.3"/>
  <circle cx="300" cy="150" r="18" fill="none" stroke="#F87171" stroke-width="1.5" opacity="0.4"/>
  <!-- Sparkly clean envelope -->
  <rect x="380" y="110" width="150" height="100" rx="6" fill="none" stroke="#2DD4BF" stroke-width="3"/>
  <path d="M380 110 L455 170 L530 110" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sparkle on envelope -->
  <path d="M540 105 L545 95 L550 105 L545 115Z" fill="#2DD4BF" opacity="0.6"/>
  <path d="M370 105 L375 95 L380 105 L375 115Z" fill="#F87171" opacity="0.6"/>
  <!-- Dollar sign / profit -->
  <text x="620" y="170" fill="#2DD4BF" font-family="sans-serif" font-size="60" font-weight="bold" opacity="0.2">$</text>
  <!-- 9 small solution icons in a grid -->
  <circle cx="200" cy="260" r="10" fill="none" stroke="#2DD4BF" stroke-width="1.5"/>
  <circle cx="260" cy="260" r="10" fill="none" stroke="#F87171" stroke-width="1.5"/>
  <circle cx="320" cy="260" r="10" fill="none" stroke="#2DD4BF" stroke-width="1.5"/>
  <circle cx="380" cy="260" r="10" fill="none" stroke="#F87171" stroke-width="1.5"/>
  <circle cx="440" cy="260" r="10" fill="none" stroke="#2DD4BF" stroke-width="1.5"/>
  <circle cx="500" cy="260" r="10" fill="none" stroke="#F87171" stroke-width="1.5"/>
  <circle cx="560" cy="260" r="10" fill="none" stroke="#2DD4BF" stroke-width="1.5"/>
  <circle cx="620" cy="260" r="10" fill="none" stroke="#F87171" stroke-width="1.5"/>
  <circle cx="680" cy="260" r="10" fill="none" stroke="#2DD4BF" stroke-width="1.5"/>
  <!-- Upward arrow / growth -->
  <line x1="650" cy="280" y1="220" x2="650" y2="130" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <polyline points="640,145 650,130 660,145" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="20" font-weight="bold" opacity="0.9">9 Top Email Hygiene Solutions</text>
  <text x="400" y="400" text-anchor="middle" fill="#F87171" font-family="sans-serif" font-size="14" opacity="0.7">Clean &amp; Profitable Lists</text>
</svg>