<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Downward trending graph -->
  <line x1="120" y1="100" x2="120" y2="350" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="120" y1="350" x2="680" y2="350" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Declining line -->
  <path d="M160 140 L260 170 L360 220 L460 280 L560 330" fill="none" stroke="#F87171" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M162 142 L262 172 L362 222 L462 282 L562 332" fill="none" stroke="#F87171" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <!-- Down arrow at end -->
  <path d="M550 340 L560 355 L570 340" fill="none" stroke="#F87171" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Warning symbols scattered -->
  <path d="M250 100 L240 120 L260 120 Z" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="250" y1="107" x2="250" y2="114" stroke="#F87171" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M450 160 L440 180 L460 180 Z" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="450" y1="167" x2="450" y2="174" stroke="#F87171" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Broken email icon -->
  <rect x="580" y="120" width="70" height="50" rx="4" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
  <path d="M582 122 L615 150 L648 122" fill="none" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crack/break -->
  <path d="M615 140 L610 155 L620 160 L612 175" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round"/>
  <!-- Dollar signs falling -->
  <text x="200" y="300" fill="#F87171" font-family="sans-serif" font-size="18" opacity="0.3">$</text>
  <text x="300" y="320" fill="#F87171" font-family="sans-serif" font-size="14" opacity="0.25">$</text>
  <text x="420" y="310" fill="#F87171" font-family="sans-serif" font-size="20" opacity="0.2">$</text>
  <text x="400" y="420" text-anchor="middle" fill="#2DD4BF" font-family="sans-serif" font-size="14" opacity="0.6">Neglecting Email Validation</text>
</svg>