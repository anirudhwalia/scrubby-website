    <circle cx="0" cy="-3" r="5" fill="none" stroke="#1e3a8a" stroke-width="1.8"/>
    <path d="M-8 6 Q0 -2 8 6" fill="none" stroke="#1e3a8a" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M8 -10 L11 -7 L17 -14" fill="none" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
