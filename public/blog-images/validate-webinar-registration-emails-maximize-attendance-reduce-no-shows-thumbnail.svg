<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f5f7fb" rx="8"/>

  <!-- Presentation screen (sketchy frame) -->
  <rect x="160" y="70" width="480" height="240" rx="6" fill="#ffffff" stroke="#1e3a8a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
