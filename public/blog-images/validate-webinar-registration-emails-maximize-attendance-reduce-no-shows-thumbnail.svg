    <circle cx="0" cy="0" r="14" fill="#22c55e" opacity="0.2" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="0" cy="-3" r="5" fill="none" stroke="#1e3a8a" stroke-width="1.8"/>
