  <path d="M280 320 L320 320" stroke="#2DD4BF" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Envelopes falling in -->
  <rect x="275" y="210" width="20" height="14" rx="2" stroke="#F87171" stroke-width="1.5" fill="none" transform="rotate(-10 285 217)"/>
  <rect x="310" y="215" width="20" height="14" rx="2" stroke="#2DD4BF" stroke-width="1.5" fill="none" transform="rotate(8 320 222)"/>
  <!-- ZeroBounce representation with X -->
  <rect x="440" y="230" width="160" height="80" rx="6" stroke="#F87171" stroke-width="2" fill="none" opacity="0.7"/>
  <text x="520" y="265" font-family="monospace" font-size="12" fill="#F87171" text-anchor="middle" opacity="0.7">ZEROBOUNCE</text>
  <path d="M490 280 L505 295 M505 280 L490 295" stroke="#F87171" stroke-width="2" fill="none" opacity="0.7"/>
  <text x="535" y="293" font-family="monospace" font-size="10" fill="#F87171" opacity="0.6">catch-all?</text>
  <!-- Scrubby checkmark -->
  <rect x="440" y="330" width="160" height="50" rx="6" stroke="#2DD4BF" stroke-width="2" fill="none"/>
  <text x="520" y="355" font-family="monospace" font-size="12" fill="#2DD4BF" text-anchor="middle">SCRUBBY</text>
  <path d="M490 360 L500 372 L525 348" stroke="#2DD4BF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Label -->
