<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary Meta Tags -->

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://scrubby.io/og-image.png" />

    <meta name="format-detection" content="telephone=no" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Scrubby",
      "url": "https://scrubby.io",
      "logo": "https://scrubby.io/logos/scrubby-logo.svg",
      "description": "Scrubby validates catch-all and risky emails with 98.7% accuracy, recovering up to 42% more leads that other verification tools miss.",
      "foundingDate": "2020",
      "founders": [
        { "@type": "Person", "name": "Erik Paulson" },
        { "@type": "Person", "name": "Anirudh Kaushal" }
      ],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Viru väljak 2",
        "postalCode": "10111",
        "addressLocality": "Tallinn",
        "addressCountry": "EE"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@scrubby.io",
        "contactType": "customer support"
      },
      "sameAs": [
        "https://www.linkedin.com/company/scrubbyio",
        "https://twitter.com/scrubbyio",
        "https://www.g2.com/products/scrubby/reviews"
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.85",
        "bestRating": "5",
        "ratingCount": "120",
        "reviewCount": "120"
      }
    }
    </script>

      "name": "Scrubby",
      "applicationCategory": "BusinessApplication",

      "description": "Email validation tool that validates catch-all and risky emails with 98.7% accuracy. Recover up to 42% more leads from your email lists.",
      "offers": [
        {
          "@type": "Offer",

        },
        {
          "@type": "Offer",
          "name": "Starter",
          "price": "27",
          "priceCurrency": "USD",

        },
        {
          "@type": "Offer",
          "name": "Basic",

          "priceCurrency": "USD",

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Scrubby",
      "url": "https://scrubby.io",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://scrubby.io/blog?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
